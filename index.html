<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--sf:#1a1d27;--sf2:#232733;--sf3:#2e3344;--bdr:#2e3344;--bdr2:#3a4056;
  --txt:#e4e6ef;--txt2:#c4c8d8;--mut:#8b8fa3;--mut2:#6a6f82;
  --acc:#7c6df0;--acc2:#9481f4;--grn:#3ecf8e;--amb:#f0b429;--red:#ef6461;--gold:#d4a843;--blu:#5ba4f5;--tel:#38bec9;--pnk:#e46eb0;--org:#f07c5a;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.45);
  --radius:8px;--radius-sm:6px;--radius-lg:12px;
}
[data-theme="light"]{
  --bg:#f7f8fc;--sf:#ffffff;--sf2:#f0f2f8;--sf3:#e6e9f2;--bdr:#e0e3ee;--bdr2:#c9cee0;
  --txt:#1a1d27;--txt2:#3a4056;--mut:#6a6f82;--mut2:#8b8fa3;
  --shadow-sm:0 1px 2px rgba(15,17,23,0.06);
  --shadow-md:0 4px 12px rgba(15,17,23,0.08);
  --shadow-lg:0 12px 32px rgba(15,17,23,0.14);
}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--bdr2)}
input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--acc);outline-offset:-1px}
button{cursor:pointer;background:none;border:none}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
kbd{font-family:'JetBrains Mono',ui-monospace,monospace;background:var(--sf2);border:1px solid var(--bdr);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-size:11px;color:var(--txt2)}
.tabnum{font-variant-numeric:tabular-nums}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.spin{animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn 0.15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.slide-in{animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast-in{animation:toastIn 0.25s cubic-bezier(0.22,1,0.36,1)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(0.9)}to{opacity:1;transform:none}}
.card{transition:border-color 0.15s,background 0.15s,transform 0.1s}
.card:hover{background:var(--sf3)}
.card:active{transform:scale(0.995)}
.btn-hover:hover{filter:brightness(1.15)}
.chip-hover{cursor:pointer;transition:opacity 0.15s}
.chip-hover:hover{opacity:0.75}
.row-hover:hover{background:var(--sf2)}
.link-hover:hover{color:var(--acc2)}
details>summary{cursor:pointer;list-style:none}
details>summary::-webkit-details-marker{display:none}
@media print{
  body{background:#fff;color:#000}
  .no-print{display:none!important}
  .print-only{display:block!important}
  *{box-shadow:none!important;text-shadow:none!important}
}
.print-only{display:none}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="tc-jsx">
const {useState,useEffect,useCallback,useRef,useMemo,createContext,useContext,Fragment} = React;

/* ═══════════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════════ */
const APP_VERSION = "2.0.3";
const SECTIONS = ["active","waiting","someday","done"];
const SECTION_META = {
  active:  {label:"Active",     color:"#7c6df0", raw:"124,109,240", icon:"▶"},
  waiting: {label:"Waiting On", color:"#f0b429", raw:"240,180,41",  icon:"⏳"},
  someday: {label:"Someday",    color:"#d4a843", raw:"212,168,67",  icon:"☆"},
  done:    {label:"Done",       color:"#3ecf8e", raw:"62,207,142",  icon:"✓"}
};
const STATUSES = ["Not Started","In Progress","In Review","Blocked","Done"];
const STATUS_C = {
  "Not Started":{color:"var(--mut)",  bgRaw:"139,143,163"},
  "In Progress":{color:"var(--acc)",  bgRaw:"124,109,240"},
  "In Review":  {color:"var(--amb)",  bgRaw:"240,180,41"},
  "Blocked":    {color:"var(--red)",  bgRaw:"239,100,97"},
  "Done":       {color:"var(--grn)",  bgRaw:"62,207,142"}
};
const PRIORITIES = ["Critical","High","Medium","Low"];
const PRI_M = {
  Critical:{color:"var(--red)",   bgRaw:"239,100,97", icon:"🔴", weight:4},
  High:    {color:"var(--org)",   bgRaw:"240,124,90", icon:"🟠", weight:3},
  Medium:  {color:"var(--amb)",   bgRaw:"240,180,41", icon:"🟡", weight:2},
  Low:     {color:"var(--mut)",   bgRaw:"139,143,163",icon:"⚪", weight:1}
};
const RECURRENCE_PRESETS = [
  {v:"none",     l:"Not recurring"},
  {v:"daily",    l:"Daily"},
  {v:"weekly",   l:"Weekly"},
  {v:"biweekly", l:"Every 2 weeks"},
  {v:"monthly",  l:"Monthly (same day)"},
  {v:"month-end",l:"Monthly (last business day)"},
  {v:"quarterly",l:"Quarterly"},
  {v:"yearly",   l:"Yearly"}
];
const COLOR_PRESETS = [
  {n:"Purple",h:"#7c6df0"},{n:"Blue",h:"#5ba4f5"},{n:"Teal",h:"#38bec9"},
  {n:"Green",h:"#3ecf8e"},{n:"Gold",h:"#d4a843"},{n:"Amber",h:"#f0b429"},
  {n:"Orange",h:"#f07c5a"},{n:"Red",h:"#ef6461"},{n:"Pink",h:"#e46eb0"},{n:"Gray",h:"#8b8fa3"}
];
const DEF_DOMAINS = [
  {name:"Finance",   color:"#7c6df0"},
  {name:"Audit",     color:"#ef6461"},
  {name:"FP&A",      color:"#5ba4f5"},
  {name:"Close",     color:"#3ecf8e"},
  {name:"Controls",  color:"#38bec9"},
  {name:"Reporting", color:"#d4a843"},
  {name:"Tax",       color:"#f07c5a"},
  {name:"Personal",  color:"#8b8fa3"}
];
const DEF_PROJECTS = [
  {name:"Month-End Close",         domain:"Close",     status:"Recurring"},
  {name:"GL Reconciliations",      domain:"Finance",   status:"Active"},
  {name:"External Audit Support",  domain:"Audit",     status:"Active"},
  {name:"Q3 Forecast",             domain:"FP&A",      status:"Active"},
  {name:"CMA Part 1 Prep",         domain:"Personal",  status:"Target: Oct 2026"}
];
const SAVED_VIEW_DEFAULTS = [
  {id:"v-today",   name:"Today",       filter:{dueGroup:"today"}},
  {id:"v-overdue", name:"Overdue",     filter:{dueGroup:"overdue"}},
  {id:"v-week",    name:"This Week",   filter:{dueGroup:"week"}},
  {id:"v-active",  name:"Active",      filter:{section:"active"}}
];

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const td = () => new Date().toISOString().split("T")[0];
const nowIso = () => new Date().toISOString();
const nowH = () => new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fSize = b => b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(2)+" MB";
const fDate = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fDateShort = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short"}) : "—";
const fDateTime = t => t ? new Date(t).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
const daysBetween = (a,b) => Math.round((new Date(b) - new Date(a))/(1000*60*60*24));
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split("T")[0]; };
const addMonths = (d,n) => { const x=new Date(d); x.setMonth(x.getMonth()+n); return x.toISOString().split("T")[0]; };
const lastBusinessDay = (year,month) => {
  const d = new Date(year, month+1, 0); // last day of month
  while (d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()-1);
  return d.toISOString().split("T")[0];
};
const hexToRaw = h => {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `${r},${g},${b}`;
};
const hexBg = (h,alpha=0.12) => `rgba(${hexToRaw(h)},${alpha})`;
const rgbaBg = (raw,alpha=0.12) => `rgba(${raw},${alpha})`;
const isOverdue = (t) => t.due && t.section !== "done" && t.due < td();
const priorityScore = (t) => {
  const p = PRI_M[t.priority||"Medium"]?.weight || 2;
  const daysUntil = t.due ? daysBetween(td(), t.due) : 999;
  const overdueBoost = daysUntil < 0 ? 10 : 0;
  return p*10 - Math.min(daysUntil,30) + overdueBoost;
};
const dueBucket = (t) => {
  if (!t.due) return "none";
  const diff = daysBetween(td(), t.due);
  if (t.section === "done") return "done";
  if (diff < 0) return "overdue";
  if (diff === 0) return "today";
  if (diff <= 7) return "week";
  if (diff <= 30) return "month";
  return "later";
};
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };
const csvEscape = v => {
  if (v==null) return "";
  const s = String(v);
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
};
const downloadBlob = (data, filename, type="application/json") => {
  const blob = new Blob([data], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 100);
};

/* ═══════════════════════════════════════════════════════════════════
   STYLE HELPERS (using CSS variables so light/dark just works)
   ═══════════════════════════════════════════════════════════════════ */
const pill = (color, bgRaw, alpha=0.14) => ({
  display:"inline-flex", alignItems:"center", gap:4, fontSize:10.5,
  padding:"2px 8px", borderRadius:4, fontWeight:600,
  color, background:`rgba(${bgRaw},${alpha})`, whiteSpace:"nowrap"
});
const btn = (color="var(--acc)", bgRaw="124,109,240", alpha=0.14) => ({
  background:`rgba(${bgRaw},${alpha})`, color, border:`1px solid rgba(${bgRaw},0.3)`,
  padding:"8px 14px", borderRadius:6, fontSize:13, fontWeight:600,
  whiteSpace:"nowrap", transition:"filter 0.15s"
});
const btnSm = (color="var(--acc)") => ({
  background:"none", color, padding:"4px 6px", fontSize:12, borderRadius:4
});
const iSt = {
  background:"var(--sf2)", border:"1px solid var(--bdr)", borderRadius:6,
  padding:"9px 12px", color:"var(--txt)", fontSize:13, width:"100%"
};
const sel = {...iSt, cursor:"pointer"};
const cSt = {
  background:"var(--sf)", border:"1px solid var(--bdr)", borderRadius:8, padding:16
};
const lSt = {
  display:"block", fontSize:11, fontWeight:600, color:"var(--mut)",
  marginBottom:5, textTransform:"uppercase", letterSpacing:0.5
};

/* ═══════════════════════════════════════════════════════════════════
   THEME + TOAST + AUTH context
   ═══════════════════════════════════════════════════════════════════ */
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem("tc-theme") || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem("tc-theme", theme);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", theme==="light" ? "#f7f8fc" : "#0f1117");
  }, [theme]);
  return [theme, setTheme];
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, opts={}) => {
    const id = uid();
    const toast = {id, msg, type:opts.type||"info", action:opts.action, duration:opts.duration||4000};
    setToasts(t => [...t, toast]);
    if (toast.duration) setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), toast.duration);
    return id;
  }, []);
  const dismiss = useCallback((id) => setToasts(t => t.filter(x=>x.id!==id)), []);
  return {toasts, push, dismiss};
}

function ToastStack({toasts, dismiss}) {
  const colors = {
    info:    {c:"var(--acc)", bg:"124,109,240"},
    success: {c:"var(--grn)", bg:"62,207,142"},
    warn:    {c:"var(--amb)", bg:"240,180,41"},
    error:   {c:"var(--red)", bg:"239,100,97"}
  };
  return <div className="no-print" style={{position:"fixed",bottom:16,right:16,zIndex:9000,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none",maxWidth:360}}>
    {toasts.map(t => {
      const c = colors[t.type] || colors.info;
      return <div key={t.id} className="toast-in" style={{background:"var(--sf)",border:`1px solid ${c.c}`,borderLeft:`4px solid ${c.c}`,borderRadius:8,padding:"10px 14px",boxShadow:"var(--shadow-lg)",fontSize:13,color:"var(--txt)",pointerEvents:"auto",display:"flex",alignItems:"center",gap:10,minWidth:240}}>
        <div style={{flex:1}}>{t.msg}</div>
        {t.action && <button onClick={() => { t.action.onClick(); dismiss(t.id); }} style={{color:c.c,fontWeight:700,fontSize:12,padding:"4px 10px",background:`rgba(${c.bg},0.14)`,borderRadius:4}}>{t.action.label}</button>}
        <button onClick={() => dismiss(t.id)} style={{color:"var(--mut)",fontSize:16,padding:2}}>×</button>
      </div>;
    })}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   SMALL PRESENTATIONAL COMPONENTS
   ═══════════════════════════════════════════════════════════════════ */
function SyncBadge({status}) {
  const m = {
    synced:  {c:"var(--grn)", l:"Synced",     i:"●"},
    syncing: {c:"var(--amb)", l:"Syncing…",   i:"◐"},
    offline: {c:"var(--mut)", l:"Offline",    i:"○"},
    error:   {c:"var(--red)", l:"Sync Error", i:"✕"}
  };
  const s = m[status] || m.offline;
  return <span title={s.l} style={{fontSize:11.5,color:s.c,display:"inline-flex",alignItems:"center",gap:5,fontWeight:600}}>
    <span className={status==="syncing"?"spin":""} style={{fontSize:8,display:"inline-block"}}>{s.i}</span> {s.l}
  </span>;
}

function ColorPicker({value,onChange,size=22}) {
  return <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
    {COLOR_PRESETS.map(p => <div key={p.h} onClick={()=>onChange(p.h)} title={p.n}
      style={{width:size,height:size,borderRadius:5,background:p.h,cursor:"pointer",
        border:value===p.h?"2px solid var(--txt)":"2px solid transparent",transition:"transform 0.1s"}} />)}
    <input type="color" value={value} onChange={e=>onChange(e.target.value)}
      style={{width:size+4,height:size+4,border:"none",background:"none",cursor:"pointer",padding:0}} />
  </div>;
}

function PBar({done,total,color,size=4}) {
  if (!total) return null;
  const pct = Math.round((done/total)*100);
  const barColor = color || (pct===100 ? "var(--grn)" : "var(--acc)");
  return <div style={{marginTop:6}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--mut)",marginBottom:3}}>
      <span>{done}/{total}</span><span>{pct}%</span>
    </div>
    <div style={{height:size,background:"var(--sf2)",borderRadius:size/2,overflow:"hidden"}}>
      <div style={{height:"100%",width:pct+"%",background:barColor,borderRadius:size/2,transition:"width 0.3s"}} />
    </div>
  </div>;
}

function KpiTile({label,value,accent,sub,onClick,selected}) {
  return <div onClick={onClick} style={{...cSt, cursor:onClick?"pointer":"default", padding:"14px 16px",
    borderColor:selected?accent:"var(--bdr)", boxShadow:selected?"var(--shadow-md)":"none"}}>
    <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.6,color:"var(--mut)",fontWeight:700}}>{label}</div>
    <div className="tabnum" style={{fontSize:28,fontWeight:800,color:accent||"var(--txt)",lineHeight:1.1,marginTop:4}}>{value}</div>
    {sub && <div style={{fontSize:11,color:"var(--mut)",marginTop:2}}>{sub}</div>}
  </div>;
}

function Sparkline({data, color="var(--acc)", height=32}) {
  if (!data || !data.length) return null;
  const max = Math.max(...data, 1);
  const w = 100;
  const denom = Math.max(data.length - 1, 1);
  const points = data.map((v,i) => `${(i/denom)*w},${height - (v/max)*height}`).join(" ");
  return <svg width="100%" height={height} viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{display:"block"}}>
    <polyline fill="none" stroke={color} strokeWidth="1.5" points={points} vectorEffect="non-scaling-stroke" />
  </svg>;
}

function Modal({open, onClose, title, children, width=520, footer}) {
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [open, onClose]);
  if (!open) return null;
  return <div className="fade-in no-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(2px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={onClose}>
    <div style={{background:"var(--sf)",border:"1px solid var(--bdr)",borderRadius:12,width:"100%",maxWidth:width,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"var(--shadow-lg)"}} onClick={e=>e.stopPropagation()}>
      {title && <div style={{padding:"18px 22px",borderBottom:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <h3 style={{fontSize:15,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{color:"var(--mut)",fontSize:20,lineHeight:1,padding:4}}>×</button>
      </div>}
      <div style={{padding:22,overflow:"auto",flex:1}}>{children}</div>
      {footer && <div style={{padding:"14px 22px",borderTop:"1px solid var(--bdr)",display:"flex",gap:8,justifyContent:"flex-end",flexShrink:0}}>{footer}</div>}
    </div>
  </div>;
}

function ConfirmModal({open, title, message, onConfirm, onCancel, danger}) {
  return <Modal open={open} onClose={onCancel} title={title} width={420}
    footer={<>
      <button onClick={onCancel} style={btn("var(--mut)","139,143,163")}>Cancel</button>
      <button onClick={onConfirm} style={btn(danger?"var(--red)":"var(--acc)", danger?"239,100,97":"124,109,240", 0.18)}>Confirm</button>
    </>}>
    <div style={{fontSize:14,color:"var(--txt2)",lineHeight:1.6}}>{message}</div>
  </Modal>;
}

function useConfirm() {
  const [c, setC] = useState(null);
  const ask = (opts) => new Promise(res => setC({...opts, res}));
  const el = <ConfirmModal open={!!c} title={c?.title} message={c?.message} danger={c?.danger}
    onConfirm={() => { c.res(true); setC(null); }} onCancel={() => { c?.res(false); setC(null); }} />;
  return [ask, el];
}

/* ═══════════════════════════════════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   FIREBASE SETUP SCREEN
   ═══════════════════════════════════════════════════════════════════ */
function SetupScreen({onComplete, onCancel, initial}) {
  const [cfg, setCfg] = useState(initial || {apiKey:"",authDomain:"",databaseURL:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""});
  const [paste, setPaste] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);
  const [dbUrlManual, setDbUrlManual] = useState("");

  const parse = text => {
    if (!text || !text.trim()) return;
    try {
      const trimmed = text.trim();
      if (trimmed.startsWith("{")) { try { const o=JSON.parse(trimmed); if(o.apiKey){applyConfig(o);return;} } catch(e){} }
      const start = text.indexOf("{");
      if (start === -1) { setErr("No config object found."); return; }
      let depth=0, end=-1;
      for (let i=start;i<text.length;i++){if(text[i]==="{")depth++;else if(text[i]==="}"){depth--;if(depth===0){end=i;break;}}}
      if (end === -1) { setErr("Unmatched braces in config."); return; }
      const block = text.slice(start,end+1);
      try { const o=JSON.parse(block); if(o.apiKey){applyConfig(o);return;} } catch(e){}
      const lines = block.split("\n");
      const norm = lines.map(line => line.replace(/^(\s*)(['"]?)(\w+)\2(\s*:\s*)/, (_,ind,_q,key,sep)=>`${ind}"${key}"${sep}`));
      let js = norm.join("\n").replace(/:\s*'([^']*)'/g,': "$1"').replace(/,(\s*[}\]])/g,"$1");
      try { const o=JSON.parse(js); if(o.apiKey){applyConfig(o);return;} } catch(e){}
      const result={}, kvRe=/['"]?(\w+)['"]?\s*:\s*['"]([^'"]*)['"]/g;
      let m; while((m=kvRe.exec(text))!==null) result[m[1]]=m[2];
      if (result.apiKey) { applyConfig(result); return; }
      setErr("Could not parse config. Paste the firebaseConfig object from your Firebase console.");
    } catch (e) { setErr("Parse error: "+e.message); }
  };
  const applyConfig = (obj) => {
    const c = {apiKey:obj.apiKey||"",authDomain:obj.authDomain||"",databaseURL:obj.databaseURL||"",projectId:obj.projectId||"",storageBucket:obj.storageBucket||"",messagingSenderId:obj.messagingSenderId||"",appId:obj.appId||""};
    setCfg(c); setErr("");
    if (!c.databaseURL && c.projectId) setDbUrlManual("https://"+c.projectId+"-default-rtdb.firebaseio.com");
  };
  const finalDbUrl = cfg.databaseURL || dbUrlManual;
  const go = async () => {
    if (!cfg.apiKey) { setErr("apiKey is required."); return; }
    if (!finalDbUrl) { setErr("databaseURL is required."); return; }
    const fullCfg = {...cfg, databaseURL:finalDbUrl};
    setTesting(true); setErr("");
    try {
      const testName = "test-"+Date.now();
      const a = firebase.initializeApp(fullCfg, testName);
      const db = firebase.database(a);
      await Promise.race([
        db.ref(".info/connected").once("value"),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout — verify databaseURL")),8000))
      ]);
      await a.delete();
      localStorage.setItem("tc-firebase-config", JSON.stringify(fullCfg));
      onComplete(fullCfg);
    } catch (e) {
      setErr("Connection failed: "+e.message);
      setTesting(false);
    }
  };

  return <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"var(--sf)",border:"1px solid var(--bdr)",borderRadius:14,padding:32,width:"100%",maxWidth:600,boxShadow:"var(--shadow-lg)"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:36,marginBottom:8}}>⚡</div>
        <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>Configure Firebase</h1>
        <p style={{color:"var(--mut)",fontSize:13}}>One-time setup — takes 5 minutes.</p>
      </div>
      <div style={{background:"var(--sf2)",borderRadius:8,padding:14,marginBottom:18,fontSize:12.5,color:"var(--txt2)",lineHeight:1.7}}>
        <strong style={{color:"var(--txt)"}}>Quick steps:</strong><br/>
        1. <a href="https://console.firebase.google.com" target="_blank" rel="noopener">console.firebase.google.com</a> → your project<br/>
        2. <strong>Build → Realtime Database</strong> → Create Database (any region)<br/>
        3. <strong>Build → Authentication → Sign-in method → Google</strong> → Enable<br/>
        4. <strong>⚙ Project Settings → General → Your apps → Web (&lt;/&gt;)</strong> → Register<br/>
        5. Copy the <code style={{background:"var(--sf3)",padding:"1px 5px",borderRadius:3}}>firebaseConfig</code> block and paste below<br/>
        6. Deploy the security rules from README before signing in
      </div>
      <div style={{marginBottom:14}}>
        <label style={lSt}>Paste Firebase Config</label>
        <textarea style={{...iSt,minHeight:120,fontFamily:"'JetBrains Mono',ui-monospace,monospace",fontSize:12,resize:"vertical"}}
          placeholder={'const firebaseConfig = {\n  apiKey: "AIzaSy...",\n  authDomain: "myapp.firebaseapp.com",\n  databaseURL: "https://myapp-default-rtdb.firebaseio.com",\n  projectId: "myapp"\n};'}
          value={paste} onChange={e=>{setPaste(e.target.value);parse(e.target.value);}} />
      </div>
      {cfg.apiKey && <div style={{background:"var(--sf2)",borderRadius:6,padding:12,marginBottom:14,fontSize:12}}>
        <div style={{color:"var(--grn)",fontWeight:600,marginBottom:6}}>✓ Config parsed</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px",color:"var(--mut)"}}>
          <div>apiKey: <strong style={{color:"var(--txt)"}}>{cfg.apiKey.slice(0,16)}…</strong></div>
          <div>projectId: <strong style={{color:"var(--txt)"}}>{cfg.projectId||"—"}</strong></div>
          <div>authDomain: <strong style={{color:"var(--txt)"}}>{cfg.authDomain||"—"}</strong></div>
          <div>appId: <strong style={{color:"var(--txt)"}}>{cfg.appId?cfg.appId.slice(0,20)+"…":"—"}</strong></div>
        </div>
        <div style={{marginTop:6}}>databaseURL: <strong style={{color:finalDbUrl?"var(--grn)":"var(--red)"}}>{finalDbUrl||"⚠ Missing"}</strong></div>
      </div>}
      {cfg.apiKey && !cfg.databaseURL && <div style={{marginBottom:14}}>
        <label style={lSt}>Database URL (manual entry)</label>
        <input style={iSt} value={dbUrlManual} onChange={e=>setDbUrlManual(e.target.value)}
          placeholder="https://your-project-default-rtdb.firebaseio.com" />
      </div>}
      {err && <div style={{color:"var(--red)",fontSize:13,marginBottom:12,padding:"8px 12px",background:"rgba(239,100,97,0.1)",borderRadius:6}}>⚠ {err}</div>}
      <div style={{display:"flex",gap:8}}>
        {onCancel && <button onClick={onCancel} style={{...btn("var(--mut)","139,143,163"),flex:"0 0 auto"}}>Cancel</button>}
        <button style={{...btn(),flex:1,padding:12,fontSize:14,opacity:(!cfg.apiKey||testing)?0.5:1}}
          onClick={go} disabled={!cfg.apiKey||testing}>
          {testing ? "Testing connection…" : "Test & Save"}
        </button>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   RECURRENCE ENGINE
   ═══════════════════════════════════════════════════════════════════ */
function generateNextDue(task) {
  const rec = task.recurrence;
  if (!rec || rec === "none") return null;
  const base = task.due || td();
  const d = new Date(base);
  switch(rec) {
    case "daily":     return addDays(base, 1);
    case "weekly":    return addDays(base, 7);
    case "biweekly":  return addDays(base, 14);
    case "monthly":   return addMonths(base, 1);
    case "month-end": return lastBusinessDay(d.getFullYear(), d.getMonth()+1);
    case "quarterly": return addMonths(base, 3);
    case "yearly":    return addMonths(base, 12);
    default: return null;
  }
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════ */
function App() {
  const [fbCfg, setFbCfg] = useState(undefined); // undefined=loading, null=not configured, obj=configured
  const [showSetup, setShowSetup] = useState(false);
  const [user, setUser] = useState(undefined); // undefined=loading, null=signed out, obj=signed in
  const [authErr, setAuthErr] = useState("");
  const [data, setData] = useState(null);
  const [sync, setSync] = useState("offline");
  const [theme, setTheme] = useTheme();
  const {toasts, push: toast, dismiss: dismissToast} = useToasts();
  const [confirm, confirmEl] = useConfirm();

  const VALID_VIEWS = ["dashboard","board","list","calendar","projects","reports"];
  const [view, setView] = useState(() => {
    const h = window.location.hash.replace("#","");
    return VALID_VIEWS.includes(h) ? h : "board";
  });
  useEffect(() => { if (view && "#"+view !== window.location.hash) window.location.hash = "#" + view; }, [view]);
  useEffect(() => {
    const onHash = () => { const v = window.location.hash.replace("#",""); if (VALID_VIEWS.includes(v)) setView(v); };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const [showTF, setShowTF] = useState(false);
  const [editT, setEditT] = useState(null);
  const [detailT, setDetailT] = useState(null);
  const [showPF, setShowPF] = useState(false);
  const [editP, setEditP] = useState(null);
  const [showPM, setShowPM] = useState(false);
  const [showDM, setShowDM] = useState(false);
  const [showSet, setShowSet] = useState(false);
  const [showCmd, setShowCmd] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [showSubForm, setShowSubForm] = useState(false);
  const [editSub, setEditSub] = useState(null);
  const [subDetailId, setSubDetailId] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const [sortBy, setSortBy] = useState("priority");

  const [flt, setFlt] = useState({section:"all",domain:"all",assignee:"all",status:"all",priority:"all",dueGroup:"all",project:"all",search:""});
  const dbRef = useRef(null);
  const authRef = useRef(null);
  const searchRef = useRef(null);
  const dragRef = useRef(null);
  const skipSync = useRef(false);

  // ─── Load Firebase config from localStorage ───
  useEffect(() => {
    const s = localStorage.getItem("tc-firebase-config");
    if (s) { try { setFbCfg(JSON.parse(s)); } catch { setFbCfg(null); } }
    else setFbCfg(null);
  }, []);

  // ─── Initialize Firebase app + auth listener ───
  useEffect(() => {
    if (!fbCfg) { setUser(null); return; }
    try {
      const existing = firebase.apps.find(a => a.name === "tc");
      const app = existing || firebase.initializeApp(fbCfg, "tc");
      const auth = firebase.auth(app);
      authRef.current = auth;
      const unsub = auth.onAuthStateChanged(u => {
        setUser(u || null);
        setAuthErr("");
      }, e => setAuthErr(e.message));
      return () => unsub();
    } catch (e) {
      setAuthErr("Firebase init failed: "+e.message);
      setUser(null);
    }
  }, [fbCfg]);

  // ─── Data listener (scoped to user UID) ───
  useEffect(() => {
    if (!user || !fbCfg) return;
    try {
      const app = firebase.apps.find(a => a.name === "tc");
      const db = firebase.database(app);
      const ref = db.ref(`users/${user.uid}`);
      dbRef.current = ref;
      setSync("syncing");
      const onVal = snap => {
        if (skipSync.current) { skipSync.current = false; return; }
        const v = snap.val();
        if (v) {
          setData(hydrate(v));
          setSync("synced");
        } else {
          // First-time: try v1 migration, else seed defaults
          maybeMigrateOrSeed(db, user);
        }
      };
      ref.on("value", onVal, e => { setSync("error"); toast("Sync error: "+e.message, {type:"error"}); });
      const connRef = db.ref(".info/connected");
      const onConn = s => { if (s.val()===true) setSync(prev => prev==="error" ? prev : "synced"); else setSync("offline"); };
      connRef.on("value", onConn);
      return () => { ref.off("value", onVal); connRef.off("value", onConn); };
    } catch (e) {
      setSync("error");
      toast("DB attach failed: "+e.message, {type:"error"});
    }
  }, [user, fbCfg]);

  const hydrate = v => ({
    tasks: v.tasks || [],
    projects: v.projects || [],
    people: v.people || ["Me"],
    domains: v.domains || DEF_DOMAINS,
    savedViews: v.savedViews || SAVED_VIEW_DEFAULTS,
    activity: v.activity || [],
    settings: v.settings || {}
  });

  const maybeMigrateOrSeed = async (db, u) => {
    try {
      const old = await db.ref("taskcommand").once("value");
      const oldVal = old.val();
      // Firebase may return array as object with numeric keys — normalize
      const asArray = x => Array.isArray(x) ? x : (x && typeof x === "object" ? Object.values(x) : []);
      const oldTasks = asArray(oldVal?.tasks);
      if (oldTasks.length > 0) {
        // Auto-migrate — no confirmation dialog (confirm modal cannot render during loading state)
        const oldProjects = asArray(oldVal.projects);
        const oldPeople = asArray(oldVal.people);
        const oldDomains = asArray(oldVal.domains);
        const migrated = {
          tasks: oldTasks.map(t => ({
            ...t,
            updatedAt: t.updatedAt || nowIso(),
            createdAt: t.createdAt || (t.created ? new Date(t.created).toISOString() : nowIso()),
            subtasks: asArray(t.subtasks),
            comments: asArray(t.comments),
            files: asArray(t.files).map(f => ({name:f.name,type:f.type,size:f.size,added:f.added,removed:true}))
          })),
          projects: oldProjects.length ? oldProjects : DEF_PROJECTS.map(p => ({...p, id:uid()})),
          people: oldPeople.length ? oldPeople : [u.displayName || "Me"],
          domains: oldDomains.length ? oldDomains : DEF_DOMAINS,
          savedViews: SAVED_VIEW_DEFAULTS,
          activity: [{id:uid(),type:"migrated",time:nowIso(),detail:`Auto-imported ${oldTasks.length} tasks from v1`}],
          settings: {}
        };
        await db.ref(`users/${u.uid}`).set(migrated);
        toast(`v1 data imported (${oldTasks.length} tasks, ${migrated.projects.length} projects). File attachments were removed for security — re-attach as URL links if needed.`, {type:"success", duration:9000});
        return;
      }
    } catch (e) {
      console.error("[TC] Migration read failed:", e);
      toast("Could not read v1 data — proceeding with a fresh workspace. Check your Realtime Database rules if you expected an import.", {type:"warn", duration:9000});
    }

    const seed = {
      tasks: [],
      projects: DEF_PROJECTS.map(p => ({...p, id:uid()})),
      people: [u.displayName || "Me"],
      domains: DEF_DOMAINS,
      savedViews: SAVED_VIEW_DEFAULTS,
      activity: [{id:uid(),type:"created",time:nowIso(),detail:"Workspace initialized"}],
      settings: {}
    };
    await db.ref(`users/${u.uid}`).set(seed);
    toast("Welcome, "+(u.displayName||u.email)+"! Your workspace is ready.", {type:"success"});
  };

  // ─── Save (debounced) ───
  const doSave = useCallback((nd) => {
    if (!dbRef.current) return;
    setSync("syncing");
    skipSync.current = true;
    dbRef.current.set(nd).then(() => setSync("synced")).catch(e => { setSync("error"); toast("Save failed: "+e.message, {type:"error"}); });
  }, [toast]);
  const debouncedSaveRef = useRef(null);
  useEffect(() => { debouncedSaveRef.current = debounce(doSave, 400); }, [doSave]);
  const save = useCallback((nd, {immediate=false} = {}) => {
    const clean = JSON.parse(JSON.stringify(nd));
    setData(clean);
    if (immediate) doSave(clean); else debouncedSaveRef.current?.(clean);
  }, [doSave]);

  const logActivity = useCallback((type, detail, taskId) => {
    if (!data) return;
    const activity = [...(data.activity||[]), {id:uid(), type, detail, taskId, time:nowIso()}].slice(-500);
    return {...data, activity};
  }, [data]);

  // ─── Sign in / out ───
  const signIn = async () => {
    if (!authRef.current) return;
    setAuthErr("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await authRef.current.signInWithPopup(provider);
    } catch (e) { setAuthErr(e.message); }
  };
  const signOut = async () => {
    if (!authRef.current) return;
    await authRef.current.signOut();
    setData(null);
  };

  // ─── Recurring task generator (runs once per session per day) ───
  useEffect(() => {
    if (!data || !dbRef.current) return;
    const lastRun = localStorage.getItem("tc-recur-last");
    if (lastRun === td()) return;
    const today = td();
    const newTasks = [];
    (data.tasks || []).forEach(t => {
      if (t.recurrence && t.recurrence !== "none" && t.section === "done" && !t.recurred) {
        const nextDue = generateNextDue(t);
        if (nextDue) {
          newTasks.push({...t, id:uid(), section:"active", due:nextDue, completed:null,
            taskStatus:"Not Started", createdAt:nowIso(), updatedAt:nowIso(),
            subtasks:(t.subtasks||[]).map(s=>({...s,id:uid(),taskStatus:"Not Started"})),
            comments:[], files:[], recurredFrom:t.id});
        }
      }
    });
    if (newTasks.length) {
      const marked = data.tasks.map(t => newTasks.find(n=>n.recurredFrom===t.id) ? {...t, recurred:true} : t);
      save({...logActivity("recurred", `Generated ${newTasks.length} recurring task(s)`), tasks:[...marked, ...newTasks]}, {immediate:true});
      toast(`Generated ${newTasks.length} recurring task(s)`, {type:"success"});
    }
    localStorage.setItem("tc-recur-last", today);
  }, [data, save, logActivity, toast]);

  // ─── Keyboard shortcuts ───
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") {
        if (e.key === "Escape") e.target.blur();
        return;
      }
      if ((e.metaKey||e.ctrlKey) && e.key === "k") { e.preventDefault(); setShowCmd(true); return; }
      if (e.key === "?") { setShowShortcuts(true); return; }
      if (e.key === "/") { e.preventDefault(); searchRef.current?.focus(); return; }
      if (e.key === "n" && !e.metaKey && !e.ctrlKey) { setEditT(null); setShowTF(true); return; }
      const nav = {"1":"dashboard","2":"board","3":"list","4":"calendar","5":"projects","6":"reports"};
      if (nav[e.key]) setView(nav[e.key]);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // ─── Callbacks (must be declared before any early return per Rules of Hooks) ───
  const filterTasks = useCallback(list => list.filter(t => {
    const f = flt;
    if (f.section !== "all" && t.section !== f.section) return false;
    if (f.domain !== "all" && t.domain !== f.domain) return false;
    if (f.assignee !== "all" && t.assignee !== f.assignee) return false;
    if (f.status !== "all" && t.taskStatus !== f.status) return false;
    if (f.priority !== "all" && t.priority !== f.priority) return false;
    if (f.project !== "all" && t.project !== f.project) return false;
    if (f.dueGroup && f.dueGroup !== "all" && dueBucket(t) !== f.dueGroup) return false;
    if (f.search) {
      const q = f.search.toLowerCase();
      const hay = [t.title, t.notes, t.assignee, t.project, ...(t.subtasks||[]).map(s => s.title)].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }), [flt]);

  const sortTasks = useCallback(list => {
    const sorted = [...list];
    if (sortBy === "priority") sorted.sort((a,b) => priorityScore(b) - priorityScore(a));
    else if (sortBy === "due") sorted.sort((a,b) => (a.due||"9999")<(b.due||"9999")?-1:1);
    else if (sortBy === "created") sorted.sort((a,b) => (b.createdAt||"") > (a.createdAt||"") ? 1 : -1);
    else if (sortBy === "title") sorted.sort((a,b) => (a.title||"").localeCompare(b.title||""));
    else if (sortBy === "updated") sorted.sort((a,b) => (b.updatedAt||"") > (a.updatedAt||"") ? 1 : -1);
    return sorted;
  }, [sortBy]);

  // ─── Loading & auth gates (each includes toast/confirm portals so migration/errors can still surface) ───
  if (fbCfg === undefined || user === undefined) {
    return <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)",color:"var(--mut)"}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}} className="spin">◐</div><div>Loading…</div></div>
      </div>
      <ToastStack toasts={toasts} dismiss={dismissToast} />{confirmEl}
    </>;
  }
  if (showSetup || (fbCfg === null && !user)) {
    return <><SetupScreen initial={fbCfg} onComplete={c => { setFbCfg(c); setShowSetup(false); }} onCancel={fbCfg ? () => setShowSetup(false) : null} /><ToastStack toasts={toasts} dismiss={dismissToast} />{confirmEl}</>;
  }
  if (!user) {
    return <><AuthScreen fbConfigured={!!fbCfg} onSetupClick={() => setShowSetup(true)} onSignIn={signIn} err={authErr} /><ToastStack toasts={toasts} dismiss={dismissToast} />{confirmEl}</>;
  }
  if (!data) {
    return <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)",color:"var(--mut)",flexDirection:"column",gap:12}}>
        <div style={{fontSize:32}} className="spin">◐</div>
        <div>Loading your workspace…</div>
        <SyncBadge status={sync} />
      </div>
      <ToastStack toasts={toasts} dismiss={dismissToast} />{confirmEl}
    </>;
  }

  /* ──────────────────────────────────────────────────
     ─── DATA-DERIVED VALUES ───
     ────────────────────────────────────────────────── */
  const {tasks=[], projects=[], people=[], domains=DEF_DOMAINS, savedViews=SAVED_VIEW_DEFAULTS, activity=[]} = data;
  const dNames = domains.map(d => d.name);
  const gDC = name => {
    const d = domains.find(x => x.name === name);
    return d ? {c:d.color, raw:hexToRaw(d.color), bg:hexBg(d.color,0.14)} : {c:"#8b8fa3", raw:"139,143,163", bg:"rgba(139,143,163,0.14)"};
  };

  const activeTasks = tasks.filter(t => t.section !== "done");
  const counts = Object.fromEntries(SECTIONS.map(s => [s, tasks.filter(t => t.section === s).length]));
  const overdue = tasks.filter(isOverdue);
  const dueToday = tasks.filter(t => t.section !== "done" && t.due === td());
  const dueThisWeek = tasks.filter(t => t.section !== "done" && dueBucket(t) === "week");

  const filtered = sortTasks(filterTasks(tasks));
  const aFlts = Object.entries(flt).filter(([k,v]) => v !== "all" && v !== "").length;

  /* ── Task CRUD (with activity log + timestamps) ── */
  const nowStamp = () => nowIso();
  const uTask = (id, u, actType, actDetail) => {
    const nt = tasks.map(t => t.id === id ? {...t, ...u, updatedAt:nowStamp()} : t);
    let nd = {...data, tasks:nt};
    if (actType) nd = {...nd, activity:[...(data.activity||[]), {id:uid(),type:actType,taskId:id,detail:actDetail||"",time:nowStamp()}].slice(-500)};
    save(nd);
    if (detailT?.id === id) setDetailT({...detailT, ...u});
  };
  const aTask = t => {
    const newT = {...t, id:uid(), createdAt:nowStamp(), updatedAt:nowStamp(),
      subtasks:t.subtasks||[], comments:[], files:[],
      taskStatus:t.taskStatus || "Not Started"};
    const nd = {...data, tasks:[...tasks, newT],
      activity:[...(data.activity||[]), {id:uid(),type:"created",taskId:newT.id,detail:`Created “${newT.title}”`,time:nowStamp()}].slice(-500)};
    save(nd);
    setShowTF(false); setEditT(null);
    toast(`Created "${newT.title}"`, {type:"success"});
  };
  const sEditTask = t => {
    const nt = tasks.map(x => x.id === t.id ? {...x, ...t, updatedAt:nowStamp()} : x);
    const nd = {...data, tasks:nt,
      activity:[...(data.activity||[]), {id:uid(),type:"updated",taskId:t.id,detail:`Edited “${t.title}”`,time:nowStamp()}].slice(-500)};
    save(nd);
    setShowTF(false); setEditT(null);
    if (detailT?.id === t.id) setDetailT({...detailT, ...t});
  };
  const dTask = async (id) => {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    if (!await confirm({title:"Delete task?", message:`Delete “${t.title}”? This cannot be undone.`, danger:true})) return;
    const nd = {...data, tasks:tasks.filter(x => x.id !== id),
      activity:[...(data.activity||[]), {id:uid(),type:"deleted",taskId:id,detail:`Deleted “${t.title}”`,time:nowStamp()}].slice(-500)};
    save(nd);
    if (detailT?.id === id) setDetailT(null);
    toast(`Deleted "${t.title}"`, {type:"warn", action:{label:"Undo", onClick:()=>{ save({...data, tasks:[...data.tasks]}); }}});
  };
  const mvTask = (id, to) => {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const u = {section:to, updatedAt:nowStamp()};
    if (to === "done") { u.completed = td(); u.completedAt = nowStamp(); u.taskStatus = "Done"; }
    else { u.completed = null; }
    uTask(id, u, "moved", `Moved “${t.title}” to ${SECTION_META[to].label}`);
  };
  const bulkMove = (to) => {
    if (!selected.size) return;
    let nt = tasks.map(t => selected.has(t.id) ? {...t, section:to, updatedAt:nowStamp(),
      ...(to==="done" ? {completed:td(),completedAt:nowStamp(),taskStatus:"Done"} : {})} : t);
    save({...data, tasks:nt, activity:[...(data.activity||[]),
      {id:uid(),type:"bulk-moved",detail:`Moved ${selected.size} tasks to ${SECTION_META[to].label}`,time:nowStamp()}].slice(-500)});
    setSelected(new Set());
    toast(`Moved ${selected.size} tasks`, {type:"success"});
  };
  const bulkDelete = async () => {
    if (!selected.size) return;
    if (!await confirm({title:"Delete tasks?", message:`Delete ${selected.size} selected task(s)? This cannot be undone.`, danger:true})) return;
    save({...data, tasks:tasks.filter(t => !selected.has(t.id)),
      activity:[...(data.activity||[]), {id:uid(),type:"bulk-deleted",detail:`Deleted ${selected.size} tasks`,time:nowStamp()}].slice(-500)});
    toast(`Deleted ${selected.size} tasks`, {type:"warn"});
    setSelected(new Set());
  };

  /* ── Subtasks ── */
  const mkSub = (o={}) => ({id:uid(),title:"",notes:"",assignee:"",priority:"Medium",taskStatus:"Not Started",due:"",estimatedHours:"",actualHours:"",createdAt:nowStamp(),...o});
  const addSub = (tid, sub) => { const t = tasks.find(x=>x.id===tid); if(t) uTask(tid, {subtasks:[...(t.subtasks||[]), mkSub(sub)]}); };
  const updateSub = (tid, sid, u) => { const t = tasks.find(x=>x.id===tid); if(t) uTask(tid, {subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,...u}:s)}); };
  const deleteSub = (tid, sid) => { const t = tasks.find(x=>x.id===tid); if(t) uTask(tid, {subtasks:(t.subtasks||[]).filter(s=>s.id!==sid)}); };
  const toggleSub = (tid, sid) => { const t = tasks.find(x=>x.id===tid); const s = (t.subtasks||[]).find(x=>x.id===sid); if(s){ updateSub(tid,sid,{taskStatus:s.taskStatus==="Done"?"In Progress":"Done"}); } };
  const subProg = t => { const s = t.subtasks||[]; if(!s.length) return null; const d = s.filter(x=>x.taskStatus==="Done").length; return {done:d, total:s.length, pct:Math.round((d/s.length)*100)}; };

  /* ── Comments ── */
  const addComment = (tid, text) => { const t = tasks.find(x=>x.id===tid); uTask(tid,{comments:[...(t.comments||[]),{id:uid(),text,author:user.displayName||user.email,time:nowH()}]}); };
  const delComment = (tid, cid) => { const t = tasks.find(x=>x.id===tid); uTask(tid,{comments:(t.comments||[]).filter(c=>c.id!==cid)}); };

  /* ── Files (external URL only — no base64) ── */
  const addLink = (tid, url, name) => { const t = tasks.find(x=>x.id===tid); uTask(tid,{files:[...(t.files||[]),{id:uid(),name:name||url,url,added:nowH()}]}); };
  const rmFile = (tid, fid) => { const t = tasks.find(x=>x.id===tid); uTask(tid,{files:(t.files||[]).filter(f=>f.id!==fid)}); };

  /* ── Projects ── */
  const savePrj = p => {
    let np;
    if (p.id && projects.find(x => x.id === p.id)) np = projects.map(x => x.id === p.id ? {...x, ...p, updatedAt:nowStamp()} : x);
    else np = [...projects, {...p, id:uid(), createdAt:nowStamp()}];
    save({...data, projects:np});
    setShowPF(false); setEditP(null);
  };
  const delPrj = async id => {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    if (!await confirm({title:"Delete project?", message:`Delete “${p.name}”? Existing tasks under this project will remain but lose the project reference.`, danger:true})) return;
    save({...data, projects:projects.filter(x => x.id !== id)});
  };

  /* ── People / Domains ── */
  const addPerson = n => { if(n.trim() && !people.includes(n.trim())) save({...data, people:[...people, n.trim()]}); };
  const rmPerson = n => save({...data, people:people.filter(p => p !== n)});
  const addDom = (n, c) => { if(!n.trim() || domains.find(d => d.name.toLowerCase() === n.trim().toLowerCase())) return; save({...data, domains:[...domains, {name:n.trim(), color:c}]}); };
  const updDom = (old, nn, nc) => {
    const nd = domains.map(d => d.name === old ? {name:nn.trim() || old, color:nc} : d);
    const nt = old !== nn.trim() ? tasks.map(t => t.domain === old ? {...t, domain:nn.trim()} : t) : tasks;
    const np = old !== nn.trim() ? projects.map(p => p.domain === old ? {...p, domain:nn.trim()} : p) : projects;
    save({...data, domains:nd, tasks:nt, projects:np});
  };
  const rmDom = n => save({...data, domains:domains.filter(d => d.name !== n)});

  /* ── Saved Views ── */
  const applySavedView = v => { setFlt({...flt, ...v.filter}); };
  const saveCurrentView = name => { save({...data, savedViews:[...savedViews, {id:uid(), name, filter:flt}]}); toast(`Saved view "${name}"`, {type:"success"}); };
  const delSavedView = id => save({...data, savedViews:savedViews.filter(v => v.id !== id)});

  /* ── Drag ── */
  const onDS = (e, id) => { dragRef.current = id; e.dataTransfer.effectAllowed = "move"; };
  const onDO = e => e.preventDefault();
  const onDr = (e, sec) => { e.preventDefault(); if (dragRef.current) { mvTask(dragRef.current, sec); dragRef.current = null; } };
  const setFF = (k, v) => setFlt({...flt, [k]:v});

  /* ── Filter reset ── */
  const resetFilters = () => setFlt({section:"all",domain:"all",assignee:"all",status:"all",priority:"all",dueGroup:"all",project:"all",search:""});

  /* ── Export ── */
  const exportCsv = () => {
    const cols = ["Title","Section","Status","Priority","Domain","Project","Assignee","Start Date","Due Date","Est. Hours","Actual Hours","Subtasks Done","Subtasks Total","Created","Completed","Notes"];
    const rows = filtered.map(t => {
      const sp = subProg(t);
      return [t.title, SECTION_META[t.section]?.label, t.taskStatus, t.priority, t.domain, t.project, t.assignee, t.startDate, t.due, t.estimatedHours, t.actualHours, sp?.done||0, sp?.total||0, t.createdAt?.slice(0,10)||t.created, t.completed, t.notes];
    });
    const csv = [cols, ...rows].map(r => r.map(csvEscape).join(",")).join("\n");
    downloadBlob("﻿"+csv, `taskcommand-${td()}.csv`, "text/csv;charset=utf-8");
    toast("CSV exported", {type:"success"});
  };
  const exportBackup = () => { downloadBlob(JSON.stringify(data, null, 2), `taskcommand-backup-${td()}.json`); toast("Backup exported", {type:"success"}); };

  /* ═══════════════════════════════════════════════════════════════════
     RENDER
     ═══════════════════════════════════════════════════════════════════ */
  const ctx = {
    user, data, save, tasks, projects, people, domains, savedViews, activity,
    dNames, gDC, subProg, filterTasks, sortTasks, uTask, aTask, sEditTask, dTask, mvTask,
    addSub, updateSub, deleteSub, toggleSub, addComment, delComment, addLink, rmFile,
    setDetailT, detailT, setEditT, setShowTF, setEditSub, setShowSubForm, setSubDetailId, subDetailId,
    selected, setSelected, sortBy, setSortBy,
    flt, setFlt, setFF, resetFilters, aFlts,
    onDS, onDO, onDr, td: td(),
    toast, confirm, filtered
  };

  return <AppContext.Provider value={ctx}>
    <div style={{background:"var(--bg)",color:"var(--txt)",minHeight:"100vh"}}>
      <TopBar view={view} setView={setView} sync={sync} theme={theme} setTheme={setTheme} user={user}
        onNewTask={()=>{setEditT(null);setShowTF(true);}} onCommand={()=>setShowCmd(true)}
        onSettings={()=>setShowSet(true)} searchRef={searchRef}
        overdueCount={overdue.length} todayCount={dueToday.length} weekCount={dueThisWeek.length} />

      <main style={{padding:"16px 20px 40px",maxWidth:1600,margin:"0 auto"}}>
        <FilterBar />
        <SavedViewBar apply={applySavedView} save={saveCurrentView} del={delSavedView} />
        {selected.size > 0 && <BulkActionBar count={selected.size} onMove={bulkMove} onDelete={bulkDelete} onClear={()=>setSelected(new Set())} />}

        {view === "dashboard" && <DashboardView />}
        {view === "board"     && <BoardView />}
        {view === "list"      && <ListView />}
        {view === "calendar"  && <CalendarView />}
        {view === "projects"  && <ProjectsView onNew={()=>{setEditP(null);setShowPF(true);}} onEdit={p=>{setEditP(p);setShowPF(true);}} onDelete={delPrj} />}
        {view === "reports"   && <ReportsView activity={activity} exportCsv={exportCsv} exportBackup={exportBackup} />}
      </main>

      <footer className="no-print" style={{padding:"12px 20px",borderTop:"1px solid var(--bdr)",fontSize:11,color:"var(--mut)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <span>TaskCommand v{APP_VERSION} · Press <kbd>?</kbd> for shortcuts</span>
        <SyncBadge status={sync} />
      </footer>

      <TaskFormModal open={showTF} onClose={()=>{setShowTF(false);setEditT(null);}} initial={editT} onSave={editT?.id?sEditTask:aTask} />
      <DetailPanel open={!!detailT} onClose={()=>{setDetailT(null);setSubDetailId(null);}} />
      <SubFormModal open={showSubForm && detailT} onClose={()=>{setShowSubForm(false);setEditSub(null);}} parentId={detailT?.id} initial={editSub} onAdd={addSub} onUpdate={updateSub} />
      <ProjFormModal open={showPF} onClose={()=>{setShowPF(false);setEditP(null);}} initial={editP} onSave={savePrj} />
      <PeopleModal open={showPM} onClose={()=>setShowPM(false)} onAdd={addPerson} onRemove={rmPerson} />
      <DomainModal open={showDM} onClose={()=>setShowDM(false)} onAdd={addDom} onUpdate={updDom} onRemove={rmDom} />
      <SettingsModal open={showSet} onClose={()=>setShowSet(false)} onSignOut={signOut} onReconfigureFirebase={()=>{setShowSet(false);setShowSetup(true);}}
        onManagePeople={()=>{setShowSet(false);setShowPM(true);}} onManageDomains={()=>{setShowSet(false);setShowDM(true);}}
        exportBackup={exportBackup} exportCsv={exportCsv} theme={theme} setTheme={setTheme} />
      <CommandPalette open={showCmd} onClose={()=>setShowCmd(false)} setView={setView}
        actions={{newTask:()=>{setEditT(null);setShowTF(true);}, settings:()=>setShowSet(true), theme:()=>setTheme(theme==="dark"?"light":"dark"), signOut, export:exportCsv, backup:exportBackup, people:()=>setShowPM(true), domains:()=>setShowDM(true)}} />
      <ShortcutsModal open={showShortcuts} onClose={()=>setShowShortcuts(false)} />

      <ToastStack toasts={toasts} dismiss={dismissToast} />
      {confirmEl}
    </div>
  </AppContext.Provider>;
}

/* ═══════════════════════════════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════════════════════════════ */
function TopBar({view, setView, sync, theme, setTheme, user, onNewTask, onCommand, onSettings, searchRef, overdueCount, todayCount, weekCount}) {
  const {flt, setFF, aFlts, tasks} = useApp();
  const tabs = [
    {id:"dashboard", l:"Dashboard", i:"◉", k:"1"},
    {id:"board",     l:"Board",     i:"▦", k:"2"},
    {id:"list",      l:"List",      i:"☰", k:"3"},
    {id:"calendar",  l:"Calendar",  i:"📅", k:"4"},
    {id:"projects",  l:"Projects",  i:"◆", k:"5"},
    {id:"reports",   l:"Reports",   i:"📊", k:"6"}
  ];
  return <header className="no-print" style={{position:"sticky",top:0,zIndex:100,background:"var(--bg)",borderBottom:"1px solid var(--bdr)"}}>
    <div style={{padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,flexWrap:"wrap",maxWidth:1600,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:16,flex:"1 1 auto",minWidth:0}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,display:"flex",alignItems:"center",gap:8}}><span style={{color:"var(--acc)"}}>⚡</span> TaskCommand</div>
          <div style={{fontSize:11,color:"var(--mut)",display:"flex",gap:10,flexWrap:"wrap",marginTop:2}}>
            <span className="tabnum">{tasks.length} tasks</span>
            {overdueCount>0 && <span style={{color:"var(--red)"}} className="tabnum">⚠ {overdueCount} overdue</span>}
            {todayCount>0 && <span style={{color:"var(--amb)"}} className="tabnum">{todayCount} today</span>}
            {weekCount>0 && <span className="tabnum">{weekCount} this week</span>}
            <SyncBadge status={sync} />
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{position:"relative"}}>
          <input ref={searchRef} type="search" placeholder="Search…  /" value={flt.search} onChange={e=>setFF("search", e.target.value)}
            style={{...iSt,width:200,padding:"8px 12px",fontSize:12.5}} />
        </div>
        <button onClick={onCommand} title="Command palette (⌘K)" style={{...btn("var(--mut)","139,143,163"),padding:"8px 12px",fontSize:12}}><kbd style={{background:"transparent",border:"none",padding:0}}>⌘K</kbd></button>
        <button onClick={onNewTask} style={btn()}>+ Task</button>
        <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} title="Toggle theme" style={{...btn("var(--mut)","139,143,163"),padding:"8px 12px"}}>{theme==="dark"?"☀":"🌙"}</button>
        <button onClick={onSettings} title="Settings" style={{...btn("var(--mut)","139,143,163"),padding:"8px 12px"}}>⚙</button>
        <div title={user.displayName||user.email} style={{width:32,height:32,borderRadius:"50%",background:"var(--acc)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,cursor:"pointer",backgroundImage:user.photoURL?`url(${user.photoURL})`:"none",backgroundSize:"cover"}} onClick={onSettings}>
          {!user.photoURL && (user.displayName||user.email||"U").slice(0,1).toUpperCase()}
        </div>
      </div>
    </div>
    <nav style={{padding:"0 20px",display:"flex",gap:2,borderTop:"1px solid var(--bdr)",overflowX:"auto",maxWidth:1600,margin:"0 auto"}}>
      {tabs.map(t => <button key={t.id} onClick={()=>setView(t.id)}
        style={{padding:"10px 14px",fontSize:13,fontWeight:600,color:view===t.id?"var(--acc)":"var(--mut)",
          borderBottom:`2px solid ${view===t.id?"var(--acc)":"transparent"}`,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
        <span>{t.i}</span> {t.l}
      </button>)}
    </nav>
  </header>;
}

/* ═══════════════════════════════════════════════════════════════════
   FILTER BAR
   ═══════════════════════════════════════════════════════════════════ */
function FilterBar() {
  const {flt, setFF, aFlts, resetFilters, dNames, people, projects, sortBy, setSortBy} = useApp();
  return <div className="no-print" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",padding:"10px 0",marginBottom:6}}>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.section} onChange={e=>setFF("section",e.target.value)}>
      <option value="all">All Sections</option>{SECTIONS.map(s=><option key={s} value={s}>{SECTION_META[s].label}</option>)}
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.dueGroup} onChange={e=>setFF("dueGroup",e.target.value)}>
      <option value="all">Any Due</option>
      <option value="overdue">⚠ Overdue</option>
      <option value="today">Today</option>
      <option value="week">This Week</option>
      <option value="month">This Month</option>
      <option value="later">Later</option>
      <option value="none">No Date</option>
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.domain} onChange={e=>setFF("domain",e.target.value)}>
      <option value="all">All Domains</option>{dNames.map(d=><option key={d}>{d}</option>)}
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.assignee} onChange={e=>setFF("assignee",e.target.value)}>
      <option value="all">All Assignees</option>{people.map(p=><option key={p}>{p}</option>)}
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.priority} onChange={e=>setFF("priority",e.target.value)}>
      <option value="all">Any Priority</option>{PRIORITIES.map(p=><option key={p}>{p}</option>)}
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.status} onChange={e=>setFF("status",e.target.value)}>
      <option value="all">Any Status</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
    </select>
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={flt.project} onChange={e=>setFF("project",e.target.value)}>
      <option value="all">All Projects</option>{projects.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
    </select>
    <div style={{width:1,height:20,background:"var(--bdr)",margin:"0 4px"}} />
    <select style={{...sel,width:"auto",padding:"7px 10px",fontSize:12}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
      <option value="priority">Sort: Priority</option>
      <option value="due">Sort: Due date</option>
      <option value="updated">Sort: Recently updated</option>
      <option value="created">Sort: Newest first</option>
      <option value="title">Sort: Title A→Z</option>
    </select>
    {aFlts > 0 && <button onClick={resetFilters} style={{...btnSm("var(--red)"), border:"1px solid rgba(239,100,97,0.3)",padding:"6px 10px",background:"rgba(239,100,97,0.08)"}}>Clear ({aFlts})</button>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════════════════
   TASK CARD (used across views)
   ═══════════════════════════════════════════════════════════════════ */
function TaskCard({task:t, compact}) {
  const {gDC, subProg, setDetailT, setEditT, setShowTF, dTask, mvTask, onDS, selected, setSelected} = useApp();
  const sec = SECTION_META[t.section], pri = PRI_M[t.priority||"Medium"], dom = gDC(t.domain), st = STATUS_C[t.taskStatus||"Not Started"];
  const ov = isOverdue(t), sp = subProg(t);
  const subCnt = (t.subtasks||[]).length, cCnt = (t.comments||[]).length, fCnt = (t.files||[]).length;
  const isSelected = selected.has(t.id);
  const toggleSelect = (e) => {
    e.stopPropagation();
    const s = new Set(selected);
    if (s.has(t.id)) s.delete(t.id); else s.add(t.id);
    setSelected(s);
  };
  return <div className="card" draggable onDragStart={e=>onDS(e,t.id)} onClick={()=>setDetailT(t)}
    style={{background:isSelected?"rgba(124,109,240,0.16)":"var(--sf2)",borderRadius:8,padding:compact?"10px 12px":"12px 14px",
      marginBottom:8,borderLeft:`3px solid ${sec.color}`,cursor:"pointer",
      opacity:t.section==="done"?0.6:1,border:isSelected?"1px solid var(--acc)":"1px solid transparent"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8,flex:1,minWidth:0}}>
        <input type="checkbox" checked={isSelected} onChange={toggleSelect} onClick={e=>e.stopPropagation()}
          title="Select for bulk actions" style={{accentColor:"var(--acc)",marginTop:3,flexShrink:0,cursor:"pointer"}} />
        <div style={{minWidth:0,flex:1}}>
          <div style={{fontWeight:600,fontSize:13.5,textDecoration:t.section==="done"?"line-through":"none",wordBreak:"break-word"}}>{t.title}</div>
          {t.assignee && t.assignee!=="Unassigned" && !compact && <div style={{fontSize:11,color:"var(--mut)",marginTop:2}}>👤 {t.assignee}</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:2,flexShrink:0}}>
        <button className="btn-hover" onClick={e=>{e.stopPropagation();mvTask(t.id, t.section==="done"?"active":"done");}}
          title={t.section==="done"?"Reopen":"Mark done"} style={btnSm(t.section==="done"?"var(--mut)":"var(--grn)")}>{t.section==="done"?"↺":"✓"}</button>
        <button className="btn-hover" onClick={e=>{e.stopPropagation();setEditT(t);setShowTF(true);}} style={btnSm("var(--mut)")}>✎</button>
        <button className="btn-hover" onClick={e=>{e.stopPropagation();dTask(t.id);}} style={btnSm("var(--red)")}>✕</button>
      </div>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8,marginLeft:26}}>
      <span style={pill(dom.c, dom.raw)}>{t.domain}</span>
      <span style={pill(pri.color, pri.bgRaw)}>{pri.icon} {t.priority}</span>
      {!compact && <span style={pill(st.color, st.bgRaw)}>{t.taskStatus||"Not Started"}</span>}
      {t.recurrence && t.recurrence!=="none" && <span style={pill("var(--tel)","56,190,201")}>↻</span>}
      {ov && <span style={pill("var(--red)","239,100,97", 0.18)}>⚠ Overdue</span>}
      {t.due && !ov && <span style={{fontSize:10.5,color:"var(--mut)"}}>📅 {fDateShort(t.due)}</span>}
      {t.project && <span style={{fontSize:10.5,color:"var(--mut)"}}>◆ {t.project}</span>}
    </div>
    {sp && !compact && <PBar done={sp.done} total={sp.total} />}
    {(subCnt>0||cCnt>0||fCnt>0) && !compact && <div style={{display:"flex",gap:12,marginTop:8,marginLeft:26,fontSize:11,color:"var(--mut)"}}>
      {subCnt>0 && <span>☑ {sp?sp.done:0}/{subCnt}</span>}
      {cCnt>0 && <span>💬 {cCnt}</span>}
      {fCnt>0 && <span>🔗 {fCnt}</span>}
    </div>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   DASHBOARD VIEW
   ═══════════════════════════════════════════════════════════════════ */
function DashboardView() {
  const {tasks, projects, people, domains, gDC, activity} = useApp();
  const today = td();
  const active = tasks.filter(t => t.section !== "done");
  const done = tasks.filter(t => t.section === "done");
  const overdue = tasks.filter(isOverdue);
  const dueToday = tasks.filter(t => t.section !== "done" && t.due === today);
  const dueThisWeek = tasks.filter(t => t.section !== "done" && ["today","week"].includes(dueBucket(t)));

  const workload = useMemo(() => {
    const map = {};
    active.forEach(t => { const p = t.assignee || "Unassigned"; map[p] = (map[p]||0)+1; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [active]);

  const byDomain = useMemo(() => {
    const map = {};
    domains.forEach(d => { map[d.name] = {open:0, done:0, color:d.color}; });
    tasks.forEach(t => {
      if (!map[t.domain]) map[t.domain] = {open:0, done:0, color:"#8b8fa3"};
      if (t.section === "done") map[t.domain].done++;
      else map[t.domain].open++;
    });
    return Object.entries(map).filter(([k,v])=>v.open+v.done>0);
  }, [tasks, domains]);

  const aging = useMemo(() => {
    const buckets = [
      {label:"0-7 days",   min:0,  max:7,  color:"var(--grn)"},
      {label:"8-14 days",  min:8,  max:14, color:"var(--amb)"},
      {label:"15-30 days", min:15, max:30, color:"var(--org)"},
      {label:"Over 30",    min:31, max:9999, color:"var(--red)"}
    ];
    return buckets.map(b => ({
      ...b,
      count: active.filter(t => {
        const created = t.createdAt || t.created;
        if (!created) return false;
        const days = daysBetween(created.slice(0,10), today);
        return days >= b.min && days <= b.max;
      }).length
    }));
  }, [active, today]);

  // Completion trend (14 days)
  const trend = useMemo(() => {
    const days = 14;
    const arr = new Array(days).fill(0);
    done.forEach(t => {
      const c = t.completedAt || t.completed;
      if (!c) return;
      const diff = daysBetween(c.slice(0,10), today);
      if (diff >= 0 && diff < days) arr[days-1-diff]++;
    });
    return arr;
  }, [done, today]);

  const upcoming = useMemo(() =>
    active.filter(t => t.due).sort((a,b) => a.due.localeCompare(b.due)).slice(0, 8)
  , [active]);

  const hoursEst = active.reduce((s,t) => s + (parseFloat(t.estimatedHours)||0), 0);
  const hoursAct = tasks.reduce((s,t) => s + (parseFloat(t.actualHours)||0), 0);

  return <div className="fade-in">
    <h2 style={{fontSize:14,fontWeight:700,color:"var(--mut)",textTransform:"uppercase",letterSpacing:0.6,marginBottom:12}}>Executive Snapshot</h2>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:24}}>
      <KpiTile label="Active" value={active.length} accent="var(--acc)" sub={`${done.length} completed`} />
      <KpiTile label="Overdue" value={overdue.length} accent="var(--red)" sub={overdue.length ? "immediate attention" : "on track"} />
      <KpiTile label="Due Today" value={dueToday.length} accent="var(--amb)" />
      <KpiTile label="This Week" value={dueThisWeek.length} accent="var(--org)" />
      <KpiTile label="Est. Hours" value={hoursEst.toFixed(1)} accent="var(--tel)" sub={`${hoursAct.toFixed(1)}h logged`} />
      <KpiTile label="Projects" value={projects.length} accent="var(--gold)" sub={`${people.length} people`} />
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:16,marginBottom:24}}>
      {/* Aging */}
      <div style={cSt}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>Aging — Open Tasks</span>
          <span style={{fontSize:11,color:"var(--mut)",fontWeight:500}}>days since created</span>
        </div>
        {aging.map(b => {
          const max = Math.max(...aging.map(x=>x.count), 1);
          const pct = (b.count/max)*100;
          return <div key={b.label} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
              <span style={{color:"var(--txt2)"}}>{b.label}</span>
              <span className="tabnum" style={{fontWeight:700,color:b.color}}>{b.count}</span>
            </div>
            <div style={{height:6,background:"var(--sf2)",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:b.color,borderRadius:3,transition:"width 0.4s"}} />
            </div>
          </div>;
        })}
      </div>

      {/* Completion trend */}
      <div style={cSt}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>Completion Trend</span>
          <span className="tabnum" style={{fontSize:11,color:"var(--mut)",fontWeight:500}}>14 days · {trend.reduce((a,b)=>a+b,0)} closed</span>
        </div>
        <Sparkline data={trend} color="var(--grn)" height={60} />
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--mut)",marginTop:4}}>
          <span>14d ago</span><span>Today</span>
        </div>
      </div>

      {/* Workload */}
      <div style={cSt}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Workload by Assignee</div>
        {workload.length === 0 ? <div style={{color:"var(--mut)",fontSize:12,fontStyle:"italic"}}>No active tasks</div>
          : workload.slice(0,6).map(([person, count]) => {
            const max = workload[0][1];
            return <div key={person} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                <span>{person}</span>
                <span className="tabnum" style={{fontWeight:700}}>{count}</span>
              </div>
              <div style={{height:5,background:"var(--sf2)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:(count/max*100)+"%",background:"var(--acc)",borderRadius:3,transition:"width 0.4s"}} />
              </div>
            </div>;
          })}
      </div>

      {/* By Domain */}
      <div style={cSt}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Open vs. Done by Domain</div>
        {byDomain.slice(0,8).map(([name, {open,done,color}]) => {
          const total = open+done, pct = total ? (done/total)*100 : 0;
          return <div key={name} style={{marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,marginBottom:3}}>
              <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:2,background:color}} />{name}</span>
              <span className="tabnum" style={{color:"var(--mut)"}}>{open} open · {done} done</span>
            </div>
            <div style={{height:5,background:"var(--sf2)",borderRadius:3,overflow:"hidden",display:"flex"}}>
              <div style={{height:"100%",width:(open/total*100)+"%",background:color,opacity:0.6}} />
              <div style={{height:"100%",width:(done/total*100)+"%",background:"var(--grn)",opacity:0.4}} />
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Upcoming */}
    <div style={cSt}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Next 8 Deadlines</div>
      {upcoming.length === 0 ? <div style={{color:"var(--mut)",fontSize:12,fontStyle:"italic"}}>No upcoming due dates</div>
        : upcoming.map(t => <TaskCard key={t.id} task={t} compact />)}
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   CALENDAR VIEW
   ═══════════════════════════════════════════════════════════════════ */
function CalendarView() {
  const {tasks, gDC, setDetailT} = useApp();
  const today = new Date();
  const [cursor, setCursor] = useState({y:today.getFullYear(), m:today.getMonth()});
  const first = new Date(cursor.y, cursor.m, 1);
  const startDow = (first.getDay()+6)%7; // Mon=0
  const daysInMonth = new Date(cursor.y, cursor.m+1, 0).getDate();
  const cells = [];
  for (let i=0;i<startDow;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(new Date(cursor.y, cursor.m, d).toISOString().split("T")[0]);
  while (cells.length % 7 !== 0) cells.push(null);
  const monthName = first.toLocaleDateString("en-GB", {month:"long", year:"numeric"});
  const prev = () => { const d = new Date(cursor.y, cursor.m-1, 1); setCursor({y:d.getFullYear(), m:d.getMonth()}); };
  const next = () => { const d = new Date(cursor.y, cursor.m+1, 1); setCursor({y:d.getFullYear(), m:d.getMonth()}); };
  const todayStr = td();

  return <div className="fade-in" style={cSt}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h2 style={{fontSize:16,fontWeight:700}}>{monthName}</h2>
      <div style={{display:"flex",gap:6}}>
        <button onClick={prev} style={btn("var(--mut)","139,143,163")}>‹</button>
        <button onClick={()=>setCursor({y:today.getFullYear(),m:today.getMonth()})} style={btn("var(--mut)","139,143,163")}>Today</button>
        <button onClick={next} style={btn("var(--mut)","139,143,163")}>›</button>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:8}}>
      {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d =>
        <div key={d} style={{fontSize:11,fontWeight:700,color:"var(--mut)",textAlign:"center",padding:8,textTransform:"uppercase",letterSpacing:0.5}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {cells.map((day, i) => {
        if (!day) return <div key={i} />;
        const dayTasks = tasks.filter(t => t.due === day && t.section !== "done");
        const isToday = day === todayStr;
        const isWeekend = [5,6].includes(i%7);
        return <div key={day} style={{minHeight:96,border:"1px solid var(--bdr)",borderRadius:6,padding:6,background:isToday?"rgba(124,109,240,0.08)":isWeekend?"var(--sf2)":"var(--sf)",display:"flex",flexDirection:"column",gap:4,overflow:"hidden"}}>
          <div style={{fontSize:11,fontWeight:isToday?800:600,color:isToday?"var(--acc)":"var(--txt2)"}}>{day.slice(-2)}</div>
          {dayTasks.slice(0,3).map(t => {
            const dom = gDC(t.domain);
            const ov = isOverdue(t);
            return <div key={t.id} onClick={()=>setDetailT(t)} title={t.title}
              style={{fontSize:10.5,padding:"3px 6px",borderRadius:4,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:ov?"var(--red)":dom.c,background:hexBg(dom.c,0.15),fontWeight:600}}>
              {ov && "⚠ "}{t.title}
            </div>;
          })}
          {dayTasks.length > 3 && <div style={{fontSize:10,color:"var(--mut)",marginTop:2}}>+{dayTasks.length-3} more</div>}
        </div>;
      })}
    </div>
  </div>;
}

function TaskFormModal({open, onClose, initial, onSave}) {
  const {dNames, people, projects} = useApp();

      <div><label style={lSt}>Due Date</label><input style={iSt} type="date" value={f.due||""} onChange={e=>set("due",e.target.value)} /></div>
      <div><label style={lSt}>Est. Hours</label><input style={iSt} type="number" min="0" step="0.5" value={f.estimatedHours||""} onChange={e=>set("estimatedHours",e.target.value)} /></div>
