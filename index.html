<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ═══ CONSTANTS ═══ */
const SECTIONS=["active","waiting","someday","done"];
const SECTION_META={active:{label:"Active",color:"#7c6df0",bg:"rgba(124,109,240,0.12)",icon:"▶"},waiting:{label:"Waiting On",color:"#f0b429",bg:"rgba(240,180,41,0.12)",icon:"⏳"},someday:{label:"Someday",color:"#d4a843",bg:"rgba(212,168,67,0.12)",icon:"☆"},done:{label:"Done",color:"#3ecf8e",bg:"rgba(62,207,142,0.12)",icon:"✓"}};
const STATUSES=["Not Started","In Progress","In Review","Blocked","Done"];
const STATUS_C={"Not Started":{color:"#8b8fa3",bg:"rgba(139,143,163,0.12)"},"In Progress":{color:"#7c6df0",bg:"rgba(124,109,240,0.12)"},"In Review":{color:"#f0b429",bg:"rgba(240,180,41,0.12)"},"Blocked":{color:"#ef6461",bg:"rgba(239,100,97,0.12)"},"Done":{color:"#3ecf8e",bg:"rgba(62,207,142,0.12)"}};
const PRIORITIES=["Critical","High","Medium","Low"];
const PRI_M={Critical:{color:"#ef6461",bg:"rgba(239,100,97,0.15)",icon:"🔴"},High:{color:"#f07c5a",bg:"rgba(240,124,90,0.12)",icon:"🟠"},Medium:{color:"#f0b429",bg:"rgba(240,180,41,0.12)",icon:"🟡"},Low:{color:"#8b8fa3",bg:"rgba(139,143,163,0.12)",icon:"⚪"}};
const COLOR_PRESETS=[{n:"Purple",h:"#7c6df0"},{n:"Blue",h:"#5ba4f5"},{n:"Teal",h:"#38bec9"},{n:"Green",h:"#3ecf8e"},{n:"Gold",h:"#d4a843"},{n:"Amber",h:"#f0b429"},{n:"Orange",h:"#f07c5a"},{n:"Red",h:"#ef6461"},{n:"Pink",h:"#e46eb0"},{n:"Gray",h:"#8b8fa3"}];
const hexBg=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},0.12)`};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const td=()=>new Date().toISOString().split("T")[0];
const now=()=>new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fSize=b=>b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(1)+" MB";

const DEF_DOMAINS=[{name:"Finance",color:"#7c6df0"},{name:"Audit",color:"#ef6461"},{name:"FP&A",color:"#5ba4f5"},{name:"Community",color:"#d4a843"},{name:"Ministry",color:"#3ecf8e"},{name:"Study",color:"#f0b429"},{name:"Personal",color:"#8b8fa3"},{name:"IT",color:"#38bec9"}];
const DEF_STATE={tasks:[],projects:[{id:uid(),name:"GL Reconciliation Workflow",domain:"Finance",status:"Active"},{id:uid(),name:"GOSI Payable Schedule",domain:"Finance",status:"Active"},{id:uid(),name:"Mr. Elite Society 2026",domain:"Community",status:"Active"},{id:uid(),name:"Grace Center Treasury App",domain:"Ministry",status:"Active"},{id:uid(),name:"CMA Part 1 Study",domain:"Study",status:"Target: Oct 2026"}],people:["Jun Jun","Unassigned"],domains:DEF_DOMAINS};

const C={bg:"#0f1117",sf:"#1a1d27",sf2:"#232733",bdr:"#2e3344",txt:"#e4e6ef",mut:"#8b8fa3",acc:"#7c6df0",grn:"#3ecf8e",amb:"#f0b429",red:"#ef6461",gold:"#d4a843"};

/* ═══ STYLE HELPERS ═══ */
const pill=(c,bg)=>({display:"inline-flex",alignItems:"center",gap:3,fontSize:10,padding:"2px 8px",borderRadius:4,fontWeight:600,color:c,background:bg});
const btn=(c=C.acc,bg="rgba(124,109,240,0.12)")=>({background:bg,color:c,border:`1px solid ${c}30`,padding:"8px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"});
const btnSm=(c=C.acc)=>({background:"none",color:c,border:"none",padding:"4px 6px",fontSize:12,cursor:"pointer",borderRadius:4});
const iSt={background:C.sf2,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"9px 12px",color:C.txt,fontSize:13,outline:"none",width:"100%"};
const sel={...iSt,cursor:"pointer"};
const cSt={background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16};
const lSt={display:"block",fontSize:11,fontWeight:600,color:C.mut,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5};

/* ═══ SMALL COMPONENTS ═══ */
function SyncBadge({status}){const m={synced:{c:C.grn,l:"Synced",i:"☁"},syncing:{c:C.amb,l:"Syncing...",i:"↻"},offline:{c:C.mut,l:"Local Only",i:"💾"},error:{c:C.red,l:"Sync Error",i:"⚠"}};const s=m[status]||m.offline;return<span style={{fontSize:11,color:s.c,display:"inline-flex",alignItems:"center",gap:4}}>{s.i} {s.l}</span>}
function ColorPicker({value,onChange,size=22}){return<div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>{COLOR_PRESETS.map(p=><div key={p.h} onClick={()=>onChange(p.h)} title={p.n} style={{width:size,height:size,borderRadius:4,background:p.h,cursor:"pointer",border:value===p.h?"2px solid #fff":"2px solid transparent"}} />)}<input type="color" value={value} onChange={e=>onChange(e.target.value)} style={{width:size+4,height:size+4,border:"none",background:"none",cursor:"pointer",padding:0}} /></div>}
function PBar({done,total}){if(!total)return null;const pct=Math.round((done/total)*100);return<div style={{marginTop:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.mut,marginBottom:3}}><span>{done}/{total} subtasks</span><span>{pct}%</span></div><div style={{height:4,background:C.sf2,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:pct===100?C.grn:C.acc,borderRadius:2,transition:"width 0.3s"}} /></div></div>}

/* ═══ FIREBASE SETUP SCREEN ═══ */
function SetupScreen({onComplete}){
  const [cfg,setCfg]=useState({apiKey:"",authDomain:"",databaseURL:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""});
  const [paste,setPaste]=useState("");const [err,setErr]=useState("");const [testing,setTesting]=useState(false);const [dbUrlManual,setDbUrlManual]=useState("");

  /* ── Fixed parser: handles JSON, JS literals, full SDK snippets, URLs with colons ── */
  const parse=text=>{
    if(!text||!text.trim()){setErr("");return;}
    try{
      const trimmed=text.trim();
      // Strategy 1: Direct JSON
      if(trimmed.startsWith("{")){try{const o=JSON.parse(trimmed);if(o.apiKey){applyConfig(o,text);return;}}catch(e){}}
      // Strategy 2: Brace-counted extraction
      const start=text.indexOf("{");
      if(start===-1){setErr("No config object found — paste must contain { }.");return;}
      let depth=0,end=-1;
      for(let i=start;i<text.length;i++){if(text[i]==="{")depth++;else if(text[i]==="}"){depth--;if(depth===0){end=i;break;}}}
      if(end===-1){setErr("Unmatched braces in pasted config.");return;}
      const block=text.slice(start,end+1);
      // 2a: Try direct parse on extracted block
      try{const o=JSON.parse(block);if(o.apiKey){applyConfig(o,text);return;}}catch(e){}
      // 2b: Line-by-line key normalization (only touch keys at line start, NOT inside URL values)
      const lines=block.split("\n");
      const norm=lines.map(line=>line.replace(/^(\s*)(['"]?)(\w+)\2(\s*:\s*)/,(_,ind,_q,key,sep)=>`${ind}"${key}"${sep}`));
      let js=norm.join("\n");
      js=js.replace(/:\s*'([^']*)'/g,': "$1"');  // single-quoted values → double
      js=js.replace(/,(\s*[}\]])/g,"$1");         // trailing commas
      try{const o=JSON.parse(js);if(o.apiKey){applyConfig(o,text);return;}}catch(e){}
      // Strategy 3: Regex key-value extraction (last resort)
      const result={};const kvRe=/['"]?(\w+)['"]?\s*:\s*['"]([^'"]*)['"]/g;let m;
      while((m=kvRe.exec(text))!==null)result[m[1]]=m[2];
      if(result.apiKey){applyConfig(result,text);return;}
      setErr("Could not parse config. Paste the firebaseConfig object from your Firebase console.");
    }catch(e){setErr("Parse error: "+e.message);}
  };

  const applyConfig=(obj,raw)=>{
    const c={apiKey:obj.apiKey||"",authDomain:obj.authDomain||"",databaseURL:obj.databaseURL||"",projectId:obj.projectId||"",storageBucket:obj.storageBucket||"",messagingSenderId:obj.messagingSenderId||"",appId:obj.appId||""};
    setCfg(c);setPaste(raw);setErr("");
    // Auto-construct databaseURL if missing but projectId exists
    if(!c.databaseURL&&c.projectId){setDbUrlManual("https://"+c.projectId+"-default-rtdb.firebaseio.com");}
  };

  const finalDbUrl=cfg.databaseURL||dbUrlManual;

  const go=async()=>{
    if(!cfg.apiKey){setErr("apiKey is required.");return;}
    if(!finalDbUrl){setErr("databaseURL is required. Enter it manually below or re-copy config after creating Realtime Database.");return;}
    const fullCfg={...cfg,databaseURL:finalDbUrl};
    setTesting(true);setErr("");
    try{
      const a=firebase.initializeApp(fullCfg,"test-"+Date.now());const db=firebase.database(a);
      await Promise.race([db.ref(".info/connected").once("value"),new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout — check databaseURL and DB rules")),8000))]);
      a.delete();localStorage.setItem("tc-firebase-config",JSON.stringify(fullCfg));onComplete(fullCfg);
    }catch(e){setErr("Connection failed: "+e.message);setTesting(false);}
  };

  return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:12,padding:32,width:"100%",maxWidth:560}}>
    <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:36,marginBottom:8}}>⚡</div><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>TaskCommand</h1><p style={{color:C.mut,fontSize:14}}>Connect Firebase for real-time cloud sync.</p></div>
    <div style={{background:C.sf2,borderRadius:8,padding:16,marginBottom:20,fontSize:13,color:C.mut,lineHeight:1.7}}><strong style={{color:C.txt}}>Quick Setup (5 min, free):</strong><br/>1. Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a><br/>2. Create project → <strong>Build → Realtime Database → Create Database</strong> (test mode)<br/>3. <strong>Project Settings</strong> (⚙) → General → Your apps → Web ({"</>"}) → Register<br/>4. Copy the entire <code>firebaseConfig</code> block and paste below</div>
    <div style={{marginBottom:16}}><label style={lSt}>Paste Firebase Config</label><textarea style={{...iSt,minHeight:120,fontFamily:"monospace",fontSize:12,resize:"vertical"}} placeholder={'Paste any format — JSON, JS object, or full SDK snippet:\n\nconst firebaseConfig = {\n  apiKey: "AIzaSy...",\n  authDomain: "myapp.firebaseapp.com",\n  databaseURL: "https://myapp-default-rtdb.firebaseio.com",\n  projectId: "myapp"\n};'} value={paste} onChange={e=>{setPaste(e.target.value);parse(e.target.value);}} /></div>
    {cfg.apiKey&&<div style={{background:C.sf2,borderRadius:6,padding:12,marginBottom:16,fontSize:12}}>
      <div style={{color:C.grn,fontWeight:600,marginBottom:6}}>✓ Config parsed successfully</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px",color:C.mut}}>
        <div>apiKey: <strong style={{color:C.txt}}>{cfg.apiKey.slice(0,16)}...</strong></div>
        <div>projectId: <strong style={{color:C.txt}}>{cfg.projectId||"—"}</strong></div>
        <div>authDomain: <strong style={{color:C.txt}}>{cfg.authDomain||"—"}</strong></div>
        <div>appId: <strong style={{color:C.txt}}>{cfg.appId?cfg.appId.slice(0,20)+"...":"—"}</strong></div>
      </div>
      <div style={{marginTop:6}}>databaseURL: <strong style={{color:finalDbUrl?C.grn:C.red}}>{finalDbUrl||"⚠ Missing — enter below"}</strong></div>
    </div>}
    {cfg.apiKey&&!cfg.databaseURL&&<div style={{marginBottom:16}}>
      <div style={{background:"rgba(240,180,41,0.08)",border:"1px solid rgba(240,180,41,0.25)",borderRadius:8,padding:12,marginBottom:8,fontSize:12,color:C.amb}}>
        <strong>databaseURL not found in your config.</strong> Firebase only includes it if Realtime Database existed when you registered the web app. You can find it in <strong>Build → Realtime Database</strong> — the URL is shown at the top of the data viewer.
      </div>
      <label style={lSt}>Database URL</label>
      <input style={iSt} value={dbUrlManual} onChange={e=>setDbUrlManual(e.target.value)} placeholder="https://your-project-default-rtdb.firebaseio.com" />
    </div>}
    {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,padding:"8px 12px",background:"rgba(239,100,97,0.1)",borderRadius:6}}>⚠ {err}</div>}
    <button style={{...btn(),width:"100%",padding:12,fontSize:15,fontWeight:600,opacity:(!cfg.apiKey||testing)?0.5:1}} onClick={go} disabled={!cfg.apiKey||testing}>{testing?"Testing connection...":"Connect & Launch"}</button>
    <div style={{textAlign:"center",marginTop:16}}><button style={{...btnSm(C.mut),fontSize:12}} onClick={()=>{localStorage.setItem("tc-mode","local");onComplete(null);}}>Skip — use local storage only (single device)</button></div>
  </div></div>;
}

/* ═══ MAIN APP ═══ */
function App(){
  const [fbCfg,setFbCfg]=useState(undefined);
  const [data,setData]=useState(null);
  const [sync,setSync]=useState("offline");
  const [view,setView]=useState("board");
  const [showTF,setShowTF]=useState(false);
  const [editT,setEditT]=useState(null);
  const [detailT,setDetailT]=useState(null);
  const [showPF,setShowPF]=useState(false);
  const [editP,setEditP]=useState(null);
  const [showPM,setShowPM]=useState(false);
  const [showDM,setShowDM]=useState(false);
  const [showSet,setShowSet]=useState(false);
  // Subtask modals
  const [showSubForm,setShowSubForm]=useState(false);
  const [editSub,setEditSub]=useState(null);
  const [subDetailId,setSubDetailId]=useState(null);

  const [flt,setFlt]=useState({section:"all",domain:"all",assignee:"all",status:"all",priority:"all",search:""});
  const dbRef=useRef(null);const skipSync=useRef(false);const dragRef=useRef(null);

  // Init
  useEffect(()=>{const s=localStorage.getItem("tc-firebase-config");const m=localStorage.getItem("tc-mode");if(s)try{setFbCfg(JSON.parse(s));}catch{setFbCfg(null);}else if(m==="local")setFbCfg(null);else setFbCfg(undefined);},[]);

  // Firebase connect
  useEffect(()=>{if(!fbCfg)return;try{const ex=firebase.apps.find(a=>a.name==="tc");const app=ex||firebase.initializeApp(fbCfg,"tc");const db=firebase.database(app);dbRef.current=db.ref("taskcommand");
    dbRef.current.on("value",snap=>{if(skipSync.current){skipSync.current=false;return;}const v=snap.val();if(v){setData(v);localStorage.setItem("tc-data",JSON.stringify(v));setSync("synced");}else{dbRef.current.set(DEF_STATE);setData(DEF_STATE);localStorage.setItem("tc-data",JSON.stringify(DEF_STATE));setSync("synced");}},e=>{setSync("error");const l=localStorage.getItem("tc-data");setData(l?JSON.parse(l):DEF_STATE);});
    db.ref(".info/connected").on("value",s=>{if(s.val()===true)setSync("synced");});
    return()=>{dbRef.current.off();db.ref(".info/connected").off();};}catch(e){setSync("error");const l=localStorage.getItem("tc-data");setData(l?JSON.parse(l):DEF_STATE);}
  },[fbCfg]);

  // Local mode
  useEffect(()=>{if(fbCfg!==null)return;const l=localStorage.getItem("tc-data");setData(l?JSON.parse(l):DEF_STATE);setSync("offline");},[fbCfg]);

  // Save
  const save=useCallback(nd=>{const cl=JSON.parse(JSON.stringify(nd));cl.tasks=(cl.tasks||[]).map(t=>({...t,files:(t.files||[]).map(f=>({name:f.name,type:f.type,size:f.size,added:f.added})),subtasks:t.subtasks||[],comments:t.comments||[]}));setData(cl);localStorage.setItem("tc-data",JSON.stringify(cl));if(dbRef.current){setSync("syncing");skipSync.current=true;dbRef.current.set(cl).then(()=>setSync("synced")).catch(()=>setSync("error"));}},[]);

  if(fbCfg===undefined)return<SetupScreen onComplete={c=>setFbCfg(c)} />;
  if(!data)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,color:C.mut}}>⏳ Loading...</div>;

  const {tasks=[],projects=[],people=[],domains=DEF_DOMAINS}=data;
  const dNames=domains.map(d=>d.name);
  const gDC=name=>{const d=domains.find(x=>x.name===name);return d?{c:d.color,bg:hexBg(d.color)}:{c:C.mut,bg:"rgba(139,143,163,0.12)"};};
  const counts=Object.fromEntries(SECTIONS.map(s=>[s,tasks.filter(t=>t.section===s).length]));
  const overdue=tasks.filter(t=>t.due&&t.section!=="done"&&t.due<td()).length;

  const aFlt=list=>list.filter(t=>{const f=flt;if(f.section!=="all"&&t.section!==f.section)return false;if(f.domain!=="all"&&t.domain!==f.domain)return false;if(f.assignee!=="all"&&t.assignee!==f.assignee)return false;if(f.status!=="all"&&t.taskStatus!==f.status)return false;if(f.priority!=="all"&&t.priority!==f.priority)return false;if(f.search){const q=f.search.toLowerCase();if(![t.title,t.notes,t.assignee,...(t.subtasks||[]).map(s=>s.title)].join(" ").toLowerCase().includes(q))return false;}return true;});
  const filtered=aFlt(tasks);

  /* ─── Task CRUD ─── */
  const uTask=(id,u)=>{const nt=tasks.map(t=>t.id===id?{...t,...u}:t);save({...data,tasks:nt});if(detailT?.id===id)setDetailT({...detailT,...u});};
  const aTask=t=>{save({...data,tasks:[...tasks,{...t,id:uid(),created:td(),subtasks:[],comments:[],files:[],taskStatus:t.taskStatus||"Not Started"}]});setShowTF(false);setEditT(null);};
  const sEditTask=t=>{save({...data,tasks:tasks.map(x=>x.id===t.id?{...x,...t}:x)});setShowTF(false);setEditT(null);if(detailT?.id===t.id)setDetailT({...detailT,...t});};
  const dTask=id=>{save({...data,tasks:tasks.filter(t=>t.id!==id)});if(detailT?.id===id)setDetailT(null);};
  const mvTask=(id,to)=>{const u={section:to};if(to==="done"){u.completed=td();u.taskStatus="Done";}uTask(id,u);};

  /* ─── Subtask CRUD (full properties) ─── */
  const mkSub=(overrides={})=>({id:uid(),title:"",notes:"",assignee:"",priority:"Medium",taskStatus:"Not Started",due:"",estimatedHours:"",created:td(),...overrides});
  const addSub=(tid,sub)=>{const t=tasks.find(x=>x.id===tid);if(t)uTask(tid,{subtasks:[...(t.subtasks||[]),mkSub(sub)]});};
  const updateSub=(tid,sid,u)=>{const t=tasks.find(x=>x.id===tid);if(t)uTask(tid,{subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,...u}:s)});};
  const deleteSub=(tid,sid)=>{const t=tasks.find(x=>x.id===tid);if(t)uTask(tid,{subtasks:(t.subtasks||[]).filter(s=>s.id!==sid)});};
  const toggleSub=(tid,sid)=>{const t=tasks.find(x=>x.id===tid);const s=(t.subtasks||[]).find(x=>x.id===sid);if(s){const done=s.taskStatus==="Done";updateSub(tid,sid,{taskStatus:done?"In Progress":"Done"});}};

  // Subtask progress for a task
  const subProg=t=>{const s=t.subtasks||[];if(!s.length)return null;const d=s.filter(x=>x.taskStatus==="Done").length;return{done:d,total:s.length,pct:Math.round((d/s.length)*100)};};

  /* ─── Comments ─── */
  const addComment=(tid,text)=>{const t=tasks.find(x=>x.id===tid);uTask(tid,{comments:[...(t.comments||[]),{id:uid(),text,author:people[0]||"You",time:now()}]});};
  const delComment=(tid,cid)=>{const t=tasks.find(x=>x.id===tid);uTask(tid,{comments:(t.comments||[]).filter(c=>c.id!==cid)});};

  /* ─── Files ─── */
  const addFile=(tid,file)=>{const r=new FileReader();r.onload=()=>{const t=tasks.find(x=>x.id===tid);uTask(tid,{files:[...(t.files||[]),{name:file.name,type:file.type,size:file.size,data:r.result,added:now()}]});};r.readAsDataURL(file);};
  const rmFile=(tid,fn)=>{const t=tasks.find(x=>x.id===tid);uTask(tid,{files:(t.files||[]).filter(f=>f.name!==fn)});};

  /* ─── Projects ─── */

  const rmDom=n=>save({...data,domains:domains.filter(d=>d.name!==n)});

  /* ─── Drag ─── */

  /* ═══ TASK CARD ═══ */

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8,flex:1,minWidth:0}}>
          <input type="checkbox" checked={t.section==="done"} onChange={e=>{e.stopPropagation();mvTask(t.id,t.section==="done"?"active":"done");}} style={{accentColor:C.acc,marginTop:3,flexShrink:0,cursor:"pointer"}} />

        </div>
        <div style={{display:"flex",gap:2,flexShrink:0}}><span style={btnSm(C.mut)} onClick={e=>{e.stopPropagation();setEditT(t);setShowTF(true);}}>✎</span><span style={btnSm(C.red)} onClick={e=>{e.stopPropagation();dTask(t.id);}}>✕</span></div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8,marginLeft:26}}>

    {items.length===0?<div style={{textAlign:"center",padding:20,color:C.mut,fontSize:12,fontStyle:"italic"}}>Drop tasks here</div>:items.map(t=><TaskCard key={t.id} task={t} />)}
  </div>;};

  /* ═══ SUBTASK FORM MODAL ═══ */
  const SubFormModal=()=>{
    const parentId=detailT?.id;
    const isEdit=!!editSub?.id;

        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>{isEdit?"Edit Subtask":"New Subtask"}</h3>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          <select style={{...sel,width:"auto",fontSize:12,padding:"6px 10px"}} value={t.section} onChange={e=>mvTask(t.id,e.target.value)}>{SECTIONS.map(s=><option key={s} value={s}>{SECTION_META[s].label}</option>)}</select>
          <button style={{...btn(C.mut,"rgba(139,143,163,0.12)"),padding:"6px 12px",fontSize:12}} onClick={()=>{setEditT(t);setShowTF(true);setDetailT(null);}}>✎ Edit</button>
          <button style={{...btn(C.red,"rgba(239,100,97,0.12)"),padding:"6px 12px",fontSize:12}} onClick={()=>dTask(t.id)}>Delete</button>
        </div>

        {/* Notes */}
        {t.notes&&<div style={{marginBottom:16}}><div style={lSt}>Notes</div><div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",background:C.sf2,padding:12,borderRadius:6}}>{t.notes}</div></div>}

          {sp&&<PBar done={sp.done} total={sp.total} />}

          {/* Quick add */}
          <div style={{display:"flex",gap:6,margin:"8px 0"}}>

            <button style={{...btn(),padding:"8px 12px",alignSelf:"flex-end"}} onClick={()=>{if(newComment.trim()){addComment(t.id,newComment.trim());setNC("");}}}>Send</button>
          </div>
        </div>
      </div>
    </div>;

          <div style={{marginBottom:12}}><label style={lSt}>Domain</label><select style={sel} value={f.domain} onChange={e=>set("domain",e.target.value)}>{dNames.map(d=><option key={d}>{d}</option>)}</select></div>
          <div style={{marginBottom:12}}><label style={lSt}>Assignee</label><select style={sel} value={f.assignee} onChange={e=>set("assignee",e.target.value)}><option value="">Unassigned</option>{people.map(p=><option key={p}>{p}</option>)}</select></div>
          <div style={{marginBottom:12}}><label style={lSt}>Project</label><select style={sel} value={f.project||""} onChange={e=>set("project",e.target.value)}><option value="">None</option>{projects.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}</select></div>
          <div style={{marginBottom:12}}><label style={lSt}>Start Date</label><input style={iSt} type="date" value={f.startDate||""} onChange={e=>set("startDate",e.target.value)} /></div>
          <div style={{marginBottom:12}}><label style={lSt}>Due Date</label><input style={iSt} type="date" value={f.due||""} onChange={e=>set("due",e.target.value)} /></div>
          <div style={{marginBottom:12}}><label style={lSt}>Est. Hours</label><input style={iSt} type="number" min="0" step="0.5" value={f.estimatedHours||""} onChange={e=>set("estimatedHours",e.target.value)} /></div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}>
          <button style={btn(C.mut,"rgba(139,143,163,0.12)")} onClick={close}>Cancel</button>
          <button style={btn()} onClick={()=>{if(f.title.trim()){isE?sEditTask(f):aTask(f);}}}>{isE?"Update":"Add Task"}</button>
        </div>
      </div>
    </div>;
  };

  /* ═══ DOMAIN MANAGER ═══ */
  const DomainModal=()=>{
    const [nn,sNN]=useState("");const [nc,sNC]=useState(COLOR_PRESETS[0].h);
    const [ei,sEI]=useState(null);const [en,sEN]=useState("");const [ec,sEC]=useState("");
    return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={()=>setShowDM(false)}>
      <div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:10,padding:24,width:"100%",maxWidth:480,maxHeight:"85vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:6}}>Manage Domains</h3>
        <p style={{fontSize:12,color:C.mut,marginBottom:16}}>Renaming cascades to all tasks & projects.</p>
        {domains.map((d,i)=>{const isEd=ei===i;const tc=tasks.filter(t=>t.domain===d.name).length;return<div key={d.name+i} style={{padding:"10px 12px",background:C.sf2,borderRadius:8,marginBottom:6}}>
          {isEd?<div><div style={{display:"flex",gap:8,marginBottom:8}}><input style={{...iSt,flex:1}} value={en} onChange={e=>sEN(e.target.value)} autoFocus /></div><ColorPicker value={ec} onChange={sEC} /><div style={{display:"flex",gap:6,marginTop:8}}><button style={btn(C.grn,"rgba(62,207,142,0.12)")} onClick={()=>{updDom(d.name,en,ec);sEI(null);}}>Save</button><button style={btn(C.mut,"rgba(139,143,163,0.12)")} onClick={()=>sEI(null)}>Cancel</button></div></div>
          :<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:14,height:14,borderRadius:3,background:d.color,flexShrink:0}} /><span style={{flex:1,fontSize:14,fontWeight:600}}>{d.name}</span><span style={{fontSize:11,color:C.mut}}>{tc}</span><button style={btnSm(C.mut)} onClick={()=>{sEI(i);sEN(d.name);sEC(d.color);}}>✎</button><button style={btnSm(C.red)} onClick={()=>{if(tc>0){if(confirm(`"${d.name}" has ${tc} task(s). Delete?`))rmDom(d.name);}else rmDom(d.name);}}>✕</button></div>}
        </div>;})}
        <div style={{marginTop:14,padding:14,background:C.sf2,borderRadius:8,border:`1px dashed ${C.bdr}`}}>
          <div style={{...lSt,marginBottom:8}}>Add New Domain</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}><input style={{...iSt,flex:1}} placeholder="Domain name..." value={nn} onChange={e=>sNN(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nn.trim()){addDom(nn,nc);sNN("");}}} /><button style={btn()} onClick={()=>{if(nn.trim()){addDom(nn,nc);sNN("");}}}>Add</button></div>
          <ColorPicker value={nc} onChange={sNC} />
        </div>
        <button style={{...btn(C.mut,"rgba(139,143,163,0.12)"),width:"100%",marginTop:14}} onClick={()=>setShowDM(false)}>Close</button>
      </div>
    </div>;
  };

  /* ═══ PEOPLE MODAL ═══ */
  const PeopleModal=()=>{const [n,sN]=useState("");return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={()=>setShowPM(false)}><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:10,padding:24,width:"100%",maxWidth:400,maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Team Members</h3>
    {people.map(p=><div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.sf2,borderRadius:6,marginBottom:4,fontSize:13}}><span>👤 {p}</span><button style={btnSm(C.red)} onClick={()=>rmPerson(p)}>✕</button></div>)}
    <div style={{display:"flex",gap:6,marginTop:10}}><input style={{...iSt,flex:1}} placeholder="Add member..." value={n} onChange={e=>sN(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&n.trim()){addPerson(n);sN("");}}} /><button style={{...btn(),padding:"8px 12px"}} onClick={()=>{if(n.trim()){addPerson(n);sN("");}}}>Add</button></div>
    <button style={{...btn(C.mut,"rgba(139,143,163,0.12)"),width:"100%",marginTop:12}} onClick={()=>setShowPM(false)}>Close</button>
  </div></div>;};

  /* ═══ PROJECT FORM ═══ */
  const ProjFormModal=()=>{const isE=!!editP?.id;const [f,sF]=useState(editP||{name:"",domain:dNames[0]||"Finance",status:"Active"});const set=(k,v)=>sF({...f,[k]:v});const close=()=>{setShowPF(false);setEditP(null);};return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={close}><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:10,padding:24,width:"100%",maxWidth:420}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>{isE?"Edit Project":"New Project"}</h3>
    <div style={{marginBottom:12}}><label style={lSt}>Name</label><input style={iSt} value={f.name} onChange={e=>set("name",e.target.value)} autoFocus /></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div style={{marginBottom:12}}><label style={lSt}>Domain</label><select style={sel} value={f.domain} onChange={e=>set("domain",e.target.value)}>{dNames.map(d=><option key={d}>{d}</option>)}</select></div><div style={{marginBottom:12}}><label style={lSt}>Status</label><input style={iSt} value={f.status} onChange={e=>set("status",e.target.value)} /></div></div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><button style={btn(C.mut,"rgba(139,143,163,0.12)")} onClick={close}>Cancel</button><button style={btn()} onClick={()=>{if(f.name.trim())savePrj(f);}}>{isE?"Update":"Add"}</button></div>
  </div></div>;};

  /* ═══ SETTINGS ═══ */
  const SettingsModal=()=><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={()=>setShowSet(false)}><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:10,padding:24,width:"100%",maxWidth:420}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Settings</h3>
    <div style={{padding:14,background:C.sf2,borderRadius:8,marginBottom:12}}><div style={{fontSize:12,color:C.mut,marginBottom:4}}>Sync</div><div style={{fontSize:14,fontWeight:600}}>{fbCfg?"☁ Firebase":"💾 Local"}</div>{fbCfg&&<div style={{fontSize:11,color:C.mut,marginTop:4}}>{fbCfg.projectId}</div>}</div>
    <div style={{padding:14,background:C.sf2,borderRadius:8,marginBottom:12}}><div style={{fontSize:12,color:C.mut,marginBottom:4}}>Data</div><div style={{fontSize:13}}>{tasks.length} tasks • {projects.length} projects • {people.length} members • {domains.length} domains</div></div>
    <button style={{...btn(C.amb,"rgba(240,180,41,0.12)"),width:"100%",marginBottom:8}} onClick={()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="taskcommand-"+td()+".json";a.click();}}>⬇ Export Backup</button>
    <button style={{...btn(fbCfg?C.red:C.acc,fbCfg?"rgba(239,100,97,0.12)":"rgba(124,109,240,0.12)"),width:"100%",marginBottom:8}} onClick={()=>{if(fbCfg){if(confirm("Disconnect Firebase and switch to local-only?")){localStorage.removeItem("tc-firebase-config");localStorage.setItem("tc-mode","local");window.location.reload();}}else{localStorage.removeItem("tc-mode");localStorage.removeItem("tc-firebase-config");window.location.reload();}}}>{fbCfg?"Disconnect Firebase":"☁ Connect to Firebase"}</button>
    <button style={{...btn(C.red,"rgba(239,100,97,0.12)"),width:"100%",marginBottom:12}} onClick={()=>{if(confirm("Reset ALL data?")){save(DEF_STATE);setShowSet(false);}}}>Reset All</button>
    <button style={{...btn(C.mut,"rgba(139,143,163,0.12)"),width:"100%"}} onClick={()=>setShowSet(false)}>Close</button>
  </div></div>;

  /* ═══ MAIN RENDER ═══ */
  return<div style={{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",background:C.bg,color:C.txt,minHeight:"100vh",padding:"16px 20px"}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.bdr}`,flexWrap:"wrap",gap:10}}>
      <div><h1 style={{fontSize:18,fontWeight:700,margin:0}}>⚡ TaskCommand</h1><div style={{fontSize:12,color:C.mut,marginTop:2,display:"flex",alignItems:"center",gap:8}}><span>{tasks.length} tasks • {projects.length} projects</span><SyncBadge status={sync} />{overdue>0&&<span style={{color:C.red}}>⚠ {overdue} overdue</span>}</div></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><button style={btn()} onClick={()=>{setEditT(null);setShowTF(true);}}>+ Task</button><button style={btn(C.mut,"rgba(139,143,163,0.12)")} onClick={()=>setShowPM(true)}>👤</button><button style={btn(C.gold,"rgba(212,168,67,0.12)")} onClick={()=>setShowDM(true)}>◆</button><button style={btn(C.mut,"rgba(139,143,163,0.12)")} onClick={()=>setShowSet(true)}>⚙</button></div>
    </div>

    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
      {SECTIONS.map(s=><div key={s} onClick={()=>setFF("section",flt.section===s?"all":s)} style={{...cSt,cursor:"pointer",borderColor:flt.section===s?SECTION_META[s].color:C.bdr,padding:"12px 14px"}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:C.mut}}>{SECTION_META[s].label}</div><div style={{fontSize:24,fontWeight:700,color:SECTION_META[s].color,fontVariantNumeric:"tabular-nums"}}>{counts[s]}</div></div>)}
    </div>

    {/* Tabs + Filters */}
    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:14,alignItems:"center"}}>
      <div style={{display:"flex",gap:4}}>{[["board","Board"],["list","List"],["projects","Projects"]].map(([v,l])=><span key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",border:`1px solid ${view===v?C.acc:C.bdr}`,background:view===v?"rgba(124,109,240,0.12)":C.sf,color:view===v?C.acc:C.mut}}>{l}</span>)}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...iSt,width:140,padding:"6px 10px",fontSize:12}} placeholder="Search..." value={flt.search} onChange={e=>setFF("search",e.target.value)} />
        <select style={{...sel,width:"auto",padding:"6px 8px",fontSize:12}} value={flt.domain} onChange={e=>setFF("domain",e.target.value)}><option value="all">Domain</option>{dNames.map(d=><option key={d}>{d}</option>)}</select>
        <select style={{...sel,width:"auto",padding:"6px 8px",fontSize:12}} value={flt.assignee} onChange={e=>setFF("assignee",e.target.value)}><option value="all">Assignee</option>{people.map(p=><option key={p}>{p}</option>)}</select>
        <select style={{...sel,width:"auto",padding:"6px 8px",fontSize:12}} value={flt.priority} onChange={e=>setFF("priority",e.target.value)}><option value="all">Priority</option>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select>
        {aFlts>0&&<button style={btnSm(C.red)} onClick={()=>setFlt({section:"all",domain:"all",assignee:"all",status:"all",priority:"all",search:""})}>Clear ({aFlts})</button>}
      </div>
    </div>

    {/* Views */}
    {view==="board"&&<div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8}}>{SECTIONS.map(s=><Col key={s} section={s} />)}</div>}
    {view==="list"&&<div style={cSt}>{filtered.length===0?<div style={{textAlign:"center",padding:24,color:C.mut,fontSize:13}}>No tasks match.</div>:filtered.map(t=><TaskCard key={t.id} task={t} />)}</div>}
    {view==="projects"&&<div style={cSt}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:14,fontWeight:600}}>Projects ({projects.length})</span><button style={{...btn(C.gold,"rgba(212,168,67,0.12)"),padding:"6px 14px",fontSize:12}} onClick={()=>{setEditP(null);setShowPF(true);}}>+ Project</button></div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr>{["Project","Domain","Status","Tasks",""].map((h,i)=><th key={i} style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:C.mut,fontSize:11,textTransform:"uppercase",borderBottom:`1px solid ${C.bdr}`}}>{h}</th>)}</tr></thead>
      <tbody>{projects.map(p=>{const d=gDC(p.domain);const tc=tasks.filter(t=>t.project===p.name).length;return<tr key={p.id}><td style={{padding:10,borderBottom:`1px solid ${C.bdr}`,fontWeight:600}}>{p.name}</td><td style={{padding:10,borderBottom:`1px solid ${C.bdr}`}}><span style={pill(d.c,d.bg)}>{p.domain}</span></td><td style={{padding:10,borderBottom:`1px solid ${C.bdr}`}}>{p.status}</td><td style={{padding:10,borderBottom:`1px solid ${C.bdr}`,color:C.mut}}>{tc}</td><td style={{padding:10,borderBottom:`1px solid ${C.bdr}`}}><button style={btnSm(C.mut)} onClick={()=>{setEditP(p);setShowPF(true);}}>✎</button><button style={btnSm(C.red)} onClick={()=>delPrj(p.id)}>✕</button></td></tr>;})}</tbody></table>
    </div>}

    {/* Footer */}
    <div style={{marginTop:16,padding:"8px 14px",background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11,color:C.mut,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>Drag between columns • Click task for detail • Expand subtasks inline</span><SyncBadge status={sync} /></div>

    {/* Modals */}
    {showTF&&<TaskFormModal />}
    {detailT&&<DetailPanel />}
    {showSubForm&&detailT&&<SubFormModal />}
    {showPF&&<ProjFormModal />}
    {showPM&&<PeopleModal />}
    {showDM&&<DomainModal />}
    {showSet&&<SettingsModal />}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
