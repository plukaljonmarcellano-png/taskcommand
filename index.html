              onKeyDown={e=>{if(e.key==="Enter"&&quickSub.trim()){addSub(t.id,{title:quickSub.trim()});setQS("");}}} />
          </div>
          {subs.map(sub => {
            const sPri = PRI_M[sub.priority||"Medium"], sSt = STATUS_C[sub.taskStatus||"Not Started"];
            const isDone = sub.taskStatus === "Done";
            const isOv = sub.due && !isDone && sub.due < td();
            const isExp = subDetailId === sub.id;
            return <div key={sub.id} style={{background:"var(--sf2)",borderRadius:8,marginBottom:6,borderLeft:`3px solid ${sSt.color}`,overflow:"hidden"}}>
              <div style={{padding:"10px 12px",display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer"}} onClick={()=>setSubDetailId(isExp?null:sub.id)}>
                <input type="checkbox" checked={isDone} onChange={e=>{e.stopPropagation();toggleSub(t.id,sub.id);}} style={{accentColor:"var(--acc)",marginTop:3,cursor:"pointer"}} />
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,textDecoration:isDone?"line-through":"none",color:isDone?"var(--mut)":"var(--txt)",wordBreak:"break-word"}}>{sub.title}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    <span style={pill(sPri.color, sPri.bgRaw)}>{sPri.icon} {sub.priority||"Medium"}</span>
                    <span style={pill(sSt.color, sSt.bgRaw)}>{sub.taskStatus||"Not Started"}</span>
                    {sub.assignee && sub.assignee !== "Unassigned" && <span style={{fontSize:10.5,color:"var(--mut)"}}>👤 {sub.assignee}</span>}
                    {isOv && <span style={pill("var(--red)","239,100,97",0.18)}>⚠ Overdue</span>}
                    {sub.due && !isOv && <span style={{fontSize:10.5,color:"var(--mut)"}}>📅 {fDateShort(sub.due)}</span>}
                    {sub.estimatedHours && <span style={{fontSize:10.5,color:"var(--mut)"}}>⏱ {sub.estimatedHours}h</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:2,flexShrink:0}}>
                  <button onClick={e=>{e.stopPropagation();setEditSub(sub);setShowSubForm(true);}} style={btnSm("var(--mut)")}>✎</button>
                  <button onClick={e=>{e.stopPropagation();deleteSub(t.id,sub.id);}} style={btnSm("var(--red)")}>✕</button>
                </div>
              </div>
              {isExp && <div style={{padding:"0 12px 12px 38px",borderTop:"1px solid var(--bdr)"}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10,marginBottom:8}}>
                  <select style={{...sel,width:"auto",fontSize:11,padding:"4px 8px"}} value={sub.taskStatus||"Not Started"} onChange={e=>updateSub(t.id,sub.id,{taskStatus:e.target.value})}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
                  <select style={{...sel,width:"auto",fontSize:11,padding:"4px 8px"}} value={sub.priority||"Medium"} onChange={e=>updateSub(t.id,sub.id,{priority:e.target.value})}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select>
                  <select style={{...sel,width:"auto",fontSize:11,padding:"4px 8px"}} value={sub.assignee||""} onChange={e=>updateSub(t.id,sub.id,{assignee:e.target.value})}><option value="">Unassigned</option>{people.map(p=><option key={p}>{p}</option>)}</select>
                </div>
                {sub.notes && <div style={{fontSize:12,whiteSpace:"pre-wrap",background:"var(--bg)",padding:10,borderRadius:6,marginBottom:8,lineHeight:1.5}}>{sub.notes}</div>}
              </div>}
            </div>;
          })}
          {subs.length===0 && <div style={{textAlign:"center",padding:12,color:"var(--mut)",fontSize:12,fontStyle:"italic"}}>No subtasks yet</div>}
        </div>

        {/* Links (replacing base64 file storage) */}
        <div style={{marginBottom:16}}>
          <div style={lSt}>Links & References ({(t.files||[]).length})</div>
          {(t.files||[]).map(f => <div key={f.id||f.name} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"var(--sf2)",borderRadius:6,marginBottom:4,fontSize:13}}>
            <span style={{fontSize:14}}>🔗</span>
            <div style={{flex:1,minWidth:0}}>
              {f.url ? <a href={f.url} target="_blank" rel="noopener" style={{color:"var(--acc)",wordBreak:"break-all"}}>{f.name||f.url}</a>
                : <><div>{f.name}</div><div style={{fontSize:10.5,color:"var(--amb)"}}>Legacy attachment — re-add as link</div></>}
              {f.added && <div style={{fontSize:11,color:"var(--mut)"}}>{f.added}</div>}
            </div>
            <button style={btnSm("var(--red)")} onClick={()=>rmFile(t.id,f.id||f.name)}>✕</button>
          </div>)}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <input style={{...iSt,flex:2,fontSize:12}} placeholder="URL (Drive, SharePoint, etc.)" value={linkUrl} onChange={e=>setLU(e.target.value)} />
            <input style={{...iSt,flex:1,fontSize:12}} placeholder="Label (optional)" value={linkName} onChange={e=>setLN(e.target.value)} />
            <button style={btn("var(--mut)","139,143,163")} onClick={()=>{if(linkUrl.trim()){addLink(t.id, linkUrl.trim(), linkName.trim());setLU("");setLN("");}}}>Add</button>
          </div>
          <div style={{fontSize:10.5,color:"var(--mut)",marginTop:4,fontStyle:"italic"}}>Store files in Drive/SharePoint/S3 and paste the URL here. No file uploads to keep your workspace fast & secure.</div>
        </div>

        {/* Comments */}
        <div>
          <div style={lSt}>Comments ({(t.comments||[]).length})</div>
          {(t.comments||[]).map(c => <div key={c.id} style={{padding:"10px 12px",background:"var(--sf2)",borderRadius:6,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--mut)",marginBottom:4}}>
              <span style={{fontWeight:600,color:"var(--acc)"}}>{c.author}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}><span>{c.time}</span><button style={{...btnSm("var(--red)"),fontSize:10,padding:"0 4px"}} onClick={()=>delComment(t.id,c.id)}>✕</button></div>
            </div>
            <div style={{fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.5}}>{c.text}</div>
          </div>)}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <textarea style={{...iSt,minHeight:44,resize:"vertical",flex:1}} placeholder="Add a comment…" value={newComment} onChange={e=>setNC(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&e.metaKey&&newComment.trim()){addComment(t.id,newComment.trim());setNC("");}}} />
            <button style={{...btn(),padding:"8px 14px",alignSelf:"flex-end"}} onClick={()=>{if(newComment.trim()){addComment(t.id,newComment.trim());setNC("");}}}>Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

}

/* ═══════════════════════════════════════════════════════════════════
   SETTINGS MODAL
   ═══════════════════════════════════════════════════════════════════ */
function SettingsModal({open, onClose, onSignOut, onReconfigureFirebase, onManagePeople, onManageDomains, exportBackup, exportCsv, theme, setTheme}) {
  const {user, tasks, projects, people, domains, savedViews, save, data, confirm, toast} = useApp();
  const importRef = useRef(null);
  const mergeRef = useRef(null);
  const doImport = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.tasks) throw new Error("Not a valid TaskCommand backup");
        if (!await confirm({title:"Import backup?", message:`This will REPLACE all current data with the backup (${(parsed.tasks||[]).length} tasks). Continue?`, danger:true})) return;
        save(parsed, {immediate:true});
        toast("Backup imported", {type:"success"});
        onClose();
      } catch (err) { toast("Import failed: "+err.message, {type:"error"}); }
    };
    r.readAsText(f);
    e.target.value = "";
  };
  const doMerge = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.tasks || !Array.isArray(parsed.tasks)) throw new Error("Pack must contain a 'tasks' array");
        const newTasks = parsed.tasks;
        const newProjects = parsed.projects || [];
        const newDomains = parsed.domains || [];
        const newPeople = parsed.people || [];
        const newViews = parsed.savedViews || [];
        // Dedupe: skip anything whose id or (for projects/domains/people/views) name already exists
        const existingTaskIds = new Set(tasks.map(t => t.id));
        const existingProjectNames = new Set(projects.map(p => p.name.toLowerCase()));
        const existingDomainNames = new Set(domains.map(d => d.name.toLowerCase()));
        const existingPeople = new Set(people.map(p => p.toLowerCase()));
        const existingViewNames = new Set(savedViews.map(v => v.name.toLowerCase()));
        const addTasks = newTasks.filter(t => !existingTaskIds.has(t.id)).map(t => ({...t, id: t.id || uid()}));
        const addProjects = newProjects.filter(p => !existingProjectNames.has((p.name||"").toLowerCase())).map(p => ({...p, id: p.id || uid()}));
        const addDomains = newDomains.filter(d => !existingDomainNames.has((d.name||"").toLowerCase()));
        const addPeople = newPeople.filter(p => !existingPeople.has((p||"").toLowerCase()));
        const addViews = newViews.filter(v => !existingViewNames.has((v.name||"").toLowerCase())).map(v => ({...v, id: v.id || uid()}));
        const summary = [
          `${addTasks.length} task${addTasks.length!==1?"s":""}`,
          addProjects.length ? `${addProjects.length} project${addProjects.length!==1?"s":""}` : null,
          addDomains.length ? `${addDomains.length} domain${addDomains.length!==1?"s":""}` : null,
          addPeople.length ? `${addPeople.length} member${addPeople.length!==1?"s":""}` : null,
          addViews.length ? `${addViews.length} saved view${addViews.length!==1?"s":""}` : null
        ].filter(Boolean).join(", ");
        const skipped = newTasks.length - addTasks.length;
        if (addTasks.length === 0 && addProjects.length === 0 && addDomains.length === 0 && addPeople.length === 0 && addViews.length === 0) {
          toast("Nothing to merge — all items already exist", {type:"info"}); return;
        }
        if (!await confirm({title:"Merge pack?", message:`Add ${summary} to your existing workspace? ${skipped>0?`(${skipped} duplicate task${skipped!==1?"s":""} will be skipped.)`:""} Existing data is preserved.`})) return;
        const merged = {
          ...data,
          tasks: [...tasks, ...addTasks],
          projects: [...projects, ...addProjects],
          domains: [...domains, ...addDomains],
          people: [...people, ...addPeople],
          savedViews: [...savedViews, ...addViews],
          activity: [...(data.activity||[]), {id:uid(),type:"merged",time:nowIso(),detail:`Merged pack: ${summary}`}].slice(-500)
        };
        save(merged, {immediate:true});
        toast(`Merged ${summary}`, {type:"success", duration:5000});
        onClose();
      } catch (err) { toast("Merge failed: "+err.message, {type:"error"}); }
    };
    r.readAsText(f);
    e.target.value = "";
  };
  const resetAll = async () => {
    if (!await confirm({title:"Reset all data?", message:"This will delete ALL tasks, projects, and history. Cannot be undone. Export a backup first.", danger:true})) return;
    save({tasks:[], projects:DEF_PROJECTS.map(p=>({...p,id:uid()})), people:[user.displayName||"Me"], domains:DEF_DOMAINS, savedViews:SAVED_VIEW_DEFAULTS, activity:[{id:uid(),type:"reset",time:nowIso(),detail:"Workspace reset"}]}, {immediate:true});
    toast("Workspace reset", {type:"warn"});
    onClose();
  };
  return <Modal open={open} onClose={onClose} title="Settings" width={520}
    footer={<button onClick={onClose} style={btn("var(--mut)","139,143,163")}>Close</button>}>

    <div style={{display:"flex",alignItems:"center",gap:12,padding:14,background:"var(--sf2)",borderRadius:8,marginBottom:16}}>
      <div style={{width:44,height:44,borderRadius:"50%",background:"var(--acc)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,backgroundImage:user.photoURL?`url(${user.photoURL})`:"none",backgroundSize:"cover"}}>
        {!user.photoURL && (user.displayName||user.email||"U").slice(0,1).toUpperCase()}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700}}>{user.displayName||"—"}</div>
        <div style={{fontSize:12,color:"var(--mut)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
      </div>
      <button style={btn("var(--mut)","139,143,163")} onClick={onSignOut}>Sign Out</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div style={{padding:14,background:"var(--sf2)",borderRadius:8}}>
        <div style={{fontSize:11,color:"var(--mut)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5,fontWeight:700}}>Workspace</div>
        <div style={{fontSize:13,lineHeight:1.7}}>
          <div className="tabnum">{tasks.length} tasks</div>
          <div className="tabnum">{projects.length} projects</div>
          <div className="tabnum">{people.length} people</div>
          <div className="tabnum">{domains.length} domains</div>
        </div>
      </div>
      <div style={{padding:14,background:"var(--sf2)",borderRadius:8}}>
        <div style={{fontSize:11,color:"var(--mut)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5,fontWeight:700}}>App</div>
        <div style={{fontSize:13,lineHeight:1.7}}>
          <div>Version {APP_VERSION}</div>
          <div>Theme: <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{color:"var(--acc)",textDecoration:"underline",fontSize:13,padding:0}}>{theme==="dark"?"Dark":"Light"}</button></div>
        </div>
      </div>
    </div>

    <div style={{display:"grid",gap:8,marginBottom:16}}>
      <button onClick={onManagePeople} style={btn("var(--mut)","139,143,163")}>👤 Manage Team Members</button>
      <button onClick={onManageDomains} style={btn("var(--gold)","212,168,67")}>◆ Manage Domains</button>
    </div>

    <div style={{display:"grid",gap:8,marginBottom:16}}>
      <button onClick={exportBackup} style={btn("var(--acc)","124,109,240")}>⬇ Export Full Backup (JSON)</button>
      <button onClick={exportCsv} style={btn("var(--tel)","56,190,201")}>⬇ Export Tasks (CSV)</button>
      <label style={{...btn("var(--grn)","62,207,142"),display:"inline-block",textAlign:"center",cursor:"pointer"}}>
        ➕ Merge Tasks Pack (JSON) — adds without replacing
        <input ref={mergeRef} type="file" accept=".json" onChange={doMerge} style={{display:"none"}} />
      </label>
      <label style={{...btn("var(--mut)","139,143,163"),display:"inline-block",textAlign:"center",cursor:"pointer"}}>
        ⬆ Import Backup (JSON) — replaces everything
        <input ref={importRef} type="file" accept=".json" onChange={doImport} style={{display:"none"}} />
      </label>
    </div>

    <details style={{padding:14,background:"var(--sf2)",borderRadius:8,marginBottom:8}}>
      <summary style={{fontSize:13,fontWeight:700,cursor:"pointer",listStyle:"none",display:"flex",justifyContent:"space-between"}}>Danger Zone <span style={{color:"var(--mut)"}}>▾</span></summary>
      <div style={{marginTop:12,display:"grid",gap:8}}>
        <button onClick={onReconfigureFirebase} style={btn("var(--amb)","240,180,41")}>⚙ Reconfigure Firebase</button>
        <button onClick={resetAll} style={btn("var(--red)","239,100,97")}>⚠ Reset All Data</button>
      </div>
    </details>
  </Modal>;
}

/* ═══════════════════════════════════════════════════════════════════
   COMMAND PALETTE (⌘K)
   ═══════════════════════════════════════════════════════════════════ */
function CommandPalette({open, onClose, setView, actions}) {
  const {tasks, setDetailT} = useApp();
  const [q, setQ] = useState("");
  const [idx, setIdx] = useState(0);
  useEffect(() => { if (open) { setQ(""); setIdx(0); } }, [open]);
  const commands = useMemo(() => {
    const base = [
      {label:"New task",       hint:"n", act:actions.newTask},
      {label:"Go to Dashboard",hint:"1", act:()=>setView("dashboard")},
      {label:"Go to Board",    hint:"2", act:()=>setView("board")},
      {label:"Go to List",     hint:"3", act:()=>setView("list")},
      {label:"Go to Calendar", hint:"4", act:()=>setView("calendar")},
      {label:"Go to Projects", hint:"5", act:()=>setView("projects")},
      {label:"Go to Reports",  hint:"6", act:()=>setView("reports")},
      {label:"Toggle theme",   hint:"",  act:actions.theme},
      {label:"Export CSV",     hint:"",  act:actions.export},
      {label:"Export backup",  hint:"",  act:actions.backup},
      {label:"Manage people",  hint:"",  act:actions.people},
      {label:"Manage domains", hint:"",  act:actions.domains},
      {label:"Settings",       hint:"",  act:actions.settings},
      {label:"Sign out",       hint:"",  act:actions.signOut}
    ];
    const search = q.toLowerCase();
    const filtered = search ? base.filter(c => c.label.toLowerCase().includes(search)) : base;
    const taskMatches = q ? tasks.filter(t => t.title.toLowerCase().includes(search)).slice(0,6).map(t => ({
      label:`Open: ${t.title}`, hint:"task", act:()=>setDetailT(t)
    })) : [];
    return [...filtered, ...taskMatches];
  }, [q, tasks, actions, setView, setDetailT]);
  useEffect(() => { setIdx(0); }, [q]);
  const onKey = e => {
    if (e.key === "ArrowDown") { e.preventDefault(); setIdx(i => Math.min(i+1, commands.length-1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setIdx(i => Math.max(i-1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); commands[idx]?.act(); onClose(); }
  };
  return <Modal open={open} onClose={onClose} width={520}>
    <input autoFocus placeholder="Type a command or task…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={onKey}
      style={{...iSt,fontSize:15,padding:"12px 14px",marginBottom:12}} />
    <div style={{maxHeight:340,overflow:"auto"}}>
      {commands.map((c, i) => <div key={i} onClick={()=>{c.act();onClose();}}
        style={{padding:"10px 12px",borderRadius:6,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:idx===i?"var(--sf2)":"transparent"}}
        onMouseEnter={()=>setIdx(i)}>
        <span style={{fontSize:13.5,fontWeight:600}}>{c.label}</span>
        {c.hint && <kbd>{c.hint}</kbd>}
      </div>)}
      {commands.length === 0 && <div style={{padding:20,color:"var(--mut)",textAlign:"center",fontSize:13}}>No matches</div>}
    </div>
    <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--bdr)",fontSize:11,color:"var(--mut)",display:"flex",gap:14}}>
      <span><kbd>↑↓</kbd> Navigate</span><span><kbd>↵</kbd> Select</span><span><kbd>Esc</kbd> Close</span>
    </div>
  </Modal>;
}

function ShortcutsModal({open, onClose}) {
  const shortcuts = [
    {k:"⌘K / Ctrl+K",l:"Command palette"},
    {k:"/",l:"Focus search"},
    {k:"n",l:"New task"},
    {k:"?",l:"Show this help"},
    {k:"Esc",l:"Close modal / clear focus"},
    {k:"1-6",l:"Switch views"},
    {k:"⌘↵ / Ctrl↵",l:"Submit forms & comments"}
  ];
  return <Modal open={open} onClose={onClose} title="Keyboard Shortcuts" width={420}
    footer={<button onClick={onClose} style={btn()}>Got it</button>}>
    <div style={{display:"grid",gap:10}}>
      {shortcuts.map(s => <div key={s.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--sf2)",borderRadius:6}}>
        <span style={{fontSize:13}}>{s.l}</span>
        <kbd>{s.k}</kbd>
      </div>)}
    </div>
  </Modal>;
}
